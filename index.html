    // Our own Netlify serverless proxy — same origin, no CORS, fast
    async function fetchViaProxy(url, timeoutMs=12000) {
      const endpoint = `/api/proxy?url=${encodeURIComponent(url)}`;
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const r = await fetch(endpoint, { signal: ctrl.signal });
        clearTimeout(t);
        if (!r.ok) throw new Error(r.status);
        const txt = await r.text();
        if (!txt || txt.length < 10) throw new Error("empty");
        return txt;
      } catch (err) {
        clearTimeout(t);
        throw err;
      }
    }
    // ── Yahoo Finance quotes — always via our Netlify proxy (server-side, no CORS) ──
    async function yfQuote(symbols) {
      // Try Yahoo Finance v7 quote first (has regularMarketPrice + postMarketPrice)
      // Falls back to Stooq daily candles if Yahoo is blocked
      const out={};
      // Try Yahoo v7 batch quote via proxy
      try{
        const url=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols.map(s=>encodeURIComponent(s)).join(",")}&fields=regularMarketPrice,regularMarketChangePercent,postMarketPrice,postMarketChangePercent`;
        const txt=await fetchViaProxy(url,10000);
        const data=JSON.parse(txt);
        const results=data?.quoteResponse?.result||[];
        for(const r of results){
          const price=r.regularMarketPrice;
          // Always use regularMarketChangePercent for the daily % badge
          const changePct=r.regularMarketChangePercent||0;
          // After-hours data stored separately
          const ahPrice=r.postMarketPrice||null;
          const ahPct=r.postMarketChangePercent||null;
          if(price) out[r.symbol]={price,changePct,ahPrice,ahPct};
        }
      }catch{}
      // Stooq fallback for any symbols not resolved
      const missing=symbols.filter(s=>!out[s]);
      await Promise.allSettled(missing.map(async sym=>{
        try{
          const stooqSym=sym.startsWith("^")?sym.slice(1).toLowerCase():sym.toLowerCase()+".us";
          let c=null;
          try{c=await stooqCandles(stooqSym,"1W");}catch{}
          if(!c?.length) try{c=await yfCandles(sym,"1M");}catch{}
          if(c&&c.length>=2){
            const last=c[c.length-1],prev=c[c.length-2];
            const ch=last.c-prev.c;
            out[sym]={price:last.c,change:ch,changePct:prev.c?(ch/prev.c)*100:0};
          }
        }catch{}
      }));
      return out;
    }
    // ── Stooq CSV — free historical OHLCV, no API key, fetched via proxy ──
    async function stooqCandles(stooqSym, period) {
      const daysMap = {"1D":3,"5D":10,"1W":10,"1M":35,"6M":185,"YTD":370,"1Y":370,"2Y":740,"3Y":1095,"5Y":1830,"MAX":3660};
      const days = daysMap[period] || 35;
      const end = new Date(), start = new Date(+end - days*86400000);
      const fmt = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
      // Do NOT encodeURIComponent the symbol — ^ chars get double-encoded through proxies
      const url = `https://stooq.com/q/d/l/?s=${stooqSym}&d1=${fmt(start)}&d2=${fmt(end)}&i=d`;
      const csv = await fetchViaProxy(url, 12000);
      const lines = csv.trim().split('\n');
      if (lines.length < 2 || !lines[0].toLowerCase().includes('date')) throw new Error("bad data");
      return lines.slice(1).map(line => {
        const [date,o,h,l,c,v] = line.split(',');
        const ts = new Date(date).getTime();
        return {o:+o||null, h:+h||null, l:+l||null, c:+c||null, v:+(v||0), ts};
      }).filter(x => x.c && !isNaN(x.c) && x.ts && !isNaN(x.ts));
    }

    // ── Yahoo Finance v8 chart — tries direct then CORS proxy ──
    async function yfCandles(ticker, period) {
      const rangeMap={"1D":"1d","5D":"5d","1W":"5d","1M":"1mo","6M":"6mo","YTD":"ytd","1Y":"1y","2Y":"2y","3Y":"5y","5Y":"5y","MAX":"max"};
      const intMap={"1D":"5m","5D":"1d","1W":"1d","1M":"1d","6M":"1d","YTD":"1d","1Y":"1d","2Y":"1wk","3Y":"1wk","5Y":"1wk","MAX":"1mo"};
      const range=rangeMap[period]||"1mo";
      const interval=intMap[period]||"1d";
      const url1=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=${interval}&range=${range}&includePrePost=false`;
      const url2=`https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=${interval}&range=${range}&includePrePost=false`;
      let txt;
      try{txt=await fetchViaProxy(url1,14000);}catch{txt=await fetchViaProxy(url2,14000);}
      const data=JSON.parse(txt);
      const result=data?.chart?.result?.[0];
      if(!result?.timestamp)throw new Error("no data");
      const ts=result.timestamp;
      const q=result.indicators?.quote?.[0]||{};
      return ts.map((t,i)=>({o:q.open?.[i]||null,h:q.high?.[i]||null,l:q.low?.[i]||null,c:q.close?.[i]||null,v:q.volume?.[i]||0,ts:t*1000})).filter(x=>x.c!=null&&!isNaN(x.c)&&!(x.o===x.h&&x.h===x.l&&x.l===x.c&&x.v===0));
    }

    // ── Lot tracking helpers ──
    function computeFromLots(lots, currentPrice, method="HIFO") {
      if(!lots||!lots.length) return {avgCost:0,qty:0,realizedGL:0,unrealizedGL:0,active:[]};
      const allBuys=[...lots.filter(l=>l.type==="buy")];
      const sells=[...lots.filter(l=>l.type==="sell")].sort((a,b)=>new Date(a.date)-new Date(b.date));

      if(method==="AvgCost") {
        // Running weighted average — sells use current avg cost at time of sale
        const events=[...lots].sort((a,b)=>new Date(a.date)-new Date(b.date)||((a.type==="buy"?0:1)-(b.type==="buy"?0:1)));
        let runQty=0, runCost=0, realizedGL=0;
        for(const ev of events){
          if(ev.type==="buy"){runCost=runQty>0?(runCost*runQty+ev.price*ev.qty)/(runQty+ev.qty):ev.price;runQty+=ev.qty;}
          else if(ev.type==="sell"&&runQty>0){const used=Math.min(ev.qty,runQty);realizedGL+=(ev.price-runCost)*used;runQty=Math.max(0,runQty-ev.qty);}
        }
        const avgCost=runCost;
        const unrealizedGL=runQty*(currentPrice-avgCost);
        return {avgCost,qty:runQty,realizedGL,unrealizedGL,active:[{price:avgCost,rem:runQty}]};
      }

      // FIFO or HIFO: sort buys accordingly
      const buys=method==="HIFO"
        ?allBuys.sort((a,b)=>b.price-a.price)   // highest cost first
        :allBuys.sort((a,b)=>new Date(a.date)-new Date(b.date)); // oldest first (FIFO)
      const rem=buys.map(b=>({...b,rem:b.qty}));
      let realizedGL=0;
      for(const sell of sells){
        let sq=sell.qty;
        for(const lot of rem){
          if(sq<=0||lot.rem<=0)continue;
          const used=Math.min(sq,lot.rem);
          realizedGL+=(sell.price-lot.price)*used;
          lot.rem-=used; sq-=used;
        }
      }
      const active=rem.filter(l=>l.rem>0);
      const qty=active.reduce((s,l)=>s+l.rem,0);
      const cost=active.reduce((s,l)=>s+l.price*l.rem,0);
      const avgCost=qty>0?cost/qty:0;
      const unrealizedGL=qty*(currentPrice-avgCost);
      return {avgCost,qty,realizedGL,unrealizedGL,active};
    }

      // Apply dark/light mode to C on every render (option b)

      Object.assign(C, darkMode ? C_DARK : C_LIGHT);

      const [calendarData,setCalendarData]=useState(null);
      const [calendarLoading,setCalendarLoading]=useState(false);
      const [calendarFetched,setCalendarFetched]=useState(false);
      const [calViewMonth,setCalViewMonth]=useState(new Date().getMonth());
      const [calViewYear,setCalViewYear]=useState(new Date().getFullYear());
      const [calFilter,setCalFilter]=useState("all");
      const [calSelectedDay,setCalSelectedDay]=useState(null);
      const [calMarkets,setCalMarkets]=useState(["US","JP","UK","EU","CN","HK","TW"]);
      const [newsFetched,setNewsFetched]=useState(false);
      const [kalshiData,setKalshiData]=useState(null);
      const [kalshiLoading,setKalshiLoading]=useState(false);
      const [kalshiFetched,setKalshiFetched]=useState(false);
      const [priceLoading,setPriceLoading]=useState(false);
      const [priceUpdatedAt,setPriceUpdatedAt]=useState(null);
      const [marketData,setMarketData]=useState(null);
      const [marketLoading,setMarketLoading]=useState(false);
      const [apiKey,setApiKey]=useState("");
      const [showKeyModal,setShowKeyModal]=useState(false);
      const [keyInput,setKeyInput]=useState("");
      const [fundamentals,setFundamentals]=useState({}); // {[ticker]: {pe,eps,revenue,netIncome,marketCap,debtToEquity,roe,loading,error}}
      const [companyData,setCompanyData]=useState({}); // {[ticker]: {earnings,news,filings,description,ceo,employees,loading,error}}

      const [chartType,setChartType]=useState("line");
      const [portfolioModal,setPortfolioModal]=useState(null);
      const [marketChartModal,setMarketChartModal]=useState(null); // {ticker,name,period,series,timestamps,ohlc,modalLastPrice,loading}
      const [holdingSparklines,setHoldingSparklines]=useState({});
      const [portfolioChartPeriod,setPortfolioChartPeriod]=useState("1M");
      const [portfolioChartData,setPortfolioChartData]=useState(null); // {pts,ts}
      const [portfolioChartLoading,setPortfolioChartLoading]=useState(false);
      const [riskMetrics,setRiskMetrics]=useState(null); // {sharpe,beta,volatility}
      // riskPeriod derived from chart period — no separate state
      const riskPeriod=portfolioChartPeriod==="1W"?"1M":portfolioChartPeriod==="YTD"?"1Y":portfolioChartPeriod==="ALL"?"5Y":["1M","1Y","3Y","5Y"].includes(portfolioChartPeriod)?portfolioChartPeriod:"1M";
      const [holdingRiskMetrics,setHoldingRiskMetrics]=useState({}); // {[ticker]:{sharpe,beta}}
      const [strategyNotes,setStrategyNotes]=useState("");
      const [costBasisMethod,setCostBasisMethod]=useState("HIFO"); // "FIFO" | "HIFO" | "AvgCost"
      const [brokerFilter,setBrokerFilter]=useState(null); // null = all, string = specific broker
      const [yearGoal,setYearGoal]=useState(null); // % e.g. 15 means 15%
      const [hoveredSector,setHoveredSector]=useState(null);
      const holdingSparklinesRef=useRef(false);
      const firestoreSaveTimer=useRef(null);
      const fetchPricesRef=useRef(null);
      const [lotsModal,setLotsModal]=useState(null); // {holding, newBuy:{date,price,qty}, newSell:{date,price,qty}}

      // Dark mode body background
      useEffect(()=>{
        document.body.style.background = darkMode
          ? "#0f1520"
          : "#f1f4f8";
        document.body.style.minHeight = "100vh";
      },[darkMode]);

      // Auth state listener
      useEffect(()=>{
        return fbAuth.onAuthStateChanged(u=>{
          setUser(u||null);
          if(!u) setHoldings(null);
        });
      },[]);

      // Load data from Firestore when user signs in (migrate localStorage if first time)
      useEffect(()=>{
        if(!user)return;
        (async()=>{
          try{
            const doc=await fbDb.collection("users").doc(user.uid).get();
            const data=doc.data();
            if(data?.holdings){
              const loaded=data.holdings.map(migrateLegacyHolding);
              setHoldings(loaded);
              // Always fetch Jan 1 prices to ensure correct YTD baseline
              fetchYtdStartPrices(loaded);
              // Auto-refresh prices if any non-cash holding has price = 0
              const needsPrice=loaded.filter(h=>h.ticker!=="Cash"&&(!h.currentPrice||h.currentPrice===0));
              if(needsPrice.length>0){
                const tickers=loaded.filter(h=>h.ticker!=="Cash").map(h=>h.ticker);
                yfQuote(tickers).then(quotes=>{
                  setHoldings(prev=>prev.map(h=>{ const q=quotes[h.ticker]; return q?.price>0?{...h,currentPrice:q.price,changePct:q.changePct??0}:h; }));
                }).catch(()=>{});
              }
            } else {
              // First login — try to migrate localStorage data
              try{
                const local=localStorage.getItem("ft-v3");
                const parsed=local?JSON.parse(local).map(migrateLegacyHolding):[];
                setHoldings(parsed);
                if(parsed.length>0) fbDb.collection("users").doc(user.uid).set({holdings:parsed},{merge:true});
              } catch { setHoldings([]); }
            }
            if(data?.notes) setStrategyNotes(data.notes);
            if(data?.yearGoal!=null) setYearGoal(data.yearGoal);
            if(data?.costBasisMethod) setCostBasisMethod(data.costBasisMethod);
            try{ const k=localStorage.getItem("ft-apikey"); if(k)setApiKey(k); }catch{}
          } catch { setHoldings([]); }
        })();
      },[user]);

      // Save holdings to Firestore — debounced 1.5s so rapid re-renders don't cause multiple writes
      useEffect(()=>{
        if(!holdings||!user)return;
        clearTimeout(firestoreSaveTimer.current);
        firestoreSaveTimer.current=setTimeout(()=>{
          const clean=holdings.map(({changePct,...h})=>h);
          fbDb.collection("users").doc(user.uid).set({holdings:clean},{merge:true}).catch(()=>{});
        },1500);
      },[holdings]);



      useEffect(()=>{
        if(!priceFetchTrigger)return;
        const {id,ticker}=priceFetchTrigger;
        setPriceFetchTrigger(null);
        setAddPriceLoading(true);
        (async()=>{
          let price=null,chgPct=0;
          try{const q=await yfQuote([ticker]);price=q[ticker]?.price||null;chgPct=q[ticker]?.changePct??0;}catch{}
          if(price!=null) setHoldings(p=>p.map(h=>h.id===id?{...h,currentPrice:price,changePct:chgPct,ytdStartPrice:h.ytdStartPrice||price}:h));
          setAddPriceLoading(false);
        })();
      },[priceFetchTrigger]);

      useEffect(()=>{
        if(!holdings)return; // wait for Firestore load
        holdingSparklinesRef.current=false;
        if(tab==="news"){

      // ── HOLDING SPARKLINES ──
      const fetchHoldingSparklines=async()=>{

      // ── PORTFOLIO VALUE CHART ──
      const fetchPortfolioSeries=async(period)=>{

        // For ALL: find the earliest lot purchase date across all holdings
        let fetchPeriod=period;

        if(period==="ALL"){
          for(const h of nonCash){
            const dates=(h.lots||[]).map(l=>new Date(l.date).getTime()).filter(t=>!isNaN(t));
            if(dates.length) earliestMs=earliestMs?Math.min(earliestMs,...dates):Math.min(...dates);
          }
          // Map earliest date to a YF period string
          if(earliestMs){
            const daysAgo=(Date.now()-earliestMs)/86400000;
            if(daysAgo<=35)      fetchPeriod="1M";
            else if(daysAgo<=185) fetchPeriod="6M";
            else if(daysAgo<=370) fetchPeriod="1Y";
            else if(daysAgo<=740) fetchPeriod="2Y";
            else if(daysAgo<=1830)fetchPeriod="5Y";
            else                  fetchPeriod="MAX";
          } else { fetchPeriod="MAX"; }
        }

        const results=await Promise.allSettled(nonCash.map(async h=>{
          let candles=null;
          try{candles=await yfCandles(h.ticker,fetchPeriod);}catch{}
          if(!candles?.length) try{candles=await stooqCandles(h.ticker.toLowerCase()+".us",fetchPeriod);}catch{}
          return {h,candles:candles||[]};
        }));
        const valid=results.filter(r=>r.status==="fulfilled"&&r.value.candles.length>=2).map(r=>r.value);
        if(!valid.length){setPortfolioChartLoading(false);return;}

        // For ALL: trim each holding's candles to start from its own purchase date
        if(period==="ALL"&&earliestMs){
          for(const v of valid){
            const h=v.h;
            const dates=(h.lots||[]).map(l=>new Date(l.date).getTime()).filter(t=>!isNaN(t));
            const buyMs=dates.length?Math.min(...dates):earliestMs;
            // Keep only candles on or after this holding's purchase date
            // Before purchase date, holding contributes 0 to portfolio value
            v.buyMs=buyMs;
          }
        }

        // Align all series to the same timestamps using the shortest common range
        const minLen=Math.min(...valid.map(v=>v.candles.length));
        const cash=resolvedHoldings.find(h=>h.ticker==="Cash")?.qty||0;
        const alignedTs=valid[0].candles.slice(-minLen).map(c=>c.ts);

        // Build raw pts, then trim off leading timestamps where total stock value is near zero
        const rawPts=Array.from({length:minLen},(_,i)=>{
          const ts=alignedTs[i];
          let val=cash;
          for(const {h,candles,buyMs} of valid){
            const c=candles[candles.length-minLen+i];
            if(!buyMs||ts>=buyMs) val+=h.qty*c.c;
          }
          return {ts,val};
        });

        // Find first index where any holding contributes (stock value > 0)
        let startIdx=0;
        for(let i=0;i<rawPts.length;i++){
          let stockVal=0;
          for(const {h,candles,buyMs} of valid){
            const c=candles[candles.length-minLen+i];
            if(!buyMs||rawPts[i].ts>=buyMs) stockVal+=h.qty*c.c;
          }
          if(stockVal>0){startIdx=i;break;}
        }
        const trimmed=rawPts.slice(startIdx);
        const pts=trimmed.map(x=>x.val);
        const trimmedTs=trimmed.map(x=>x.ts);

        setPortfolioChartData({pts,ts:trimmedTs});
        setPortfolioChartLoading(false);
      };

      // ── RISK METRICS: Sharpe, Beta, Volatility for portfolio + each stock ──
      const fetchRiskMetrics=async(period)=>{
        const nonCash=resolvedHoldings.filter(h=>h.ticker!=="Cash");
        if(!nonCash.length)return;
        setRiskMetrics(null);
        setHoldingRiskMetrics({});
        const rfDaily=4.3/100/252;
        // Fetch S&P 500
        let spxCandles=null;
        try{spxCandles=await stooqCandles("^spx",period);}catch{}
        if(!spxCandles?.length) try{spxCandles=await yfCandles("^GSPC",period);}catch{}
        // For 3Y via Yahoo we get 5Y data — trim to ~756 trading days
        if(period==="3Y"&&spxCandles?.length>800) spxCandles=spxCandles.slice(-756);
        const spxPts=spxCandles?.length>=2?spxCandles.map(x=>x.c):null;
        const spxRets=spxPts?spxPts.slice(1).map((c,i)=>(c-spxPts[i])/spxPts[i]):null;
        // Compute helper
        const computeMetrics=(rets,mrets)=>{
          if(!rets||rets.length<5) return {sharpe:null,beta:null};
          const mean=rets.reduce((a,b)=>a+b,0)/rets.length;
          const variance=rets.reduce((a,b)=>a+(b-mean)**2,0)/rets.length;
          const sharpe=Math.sqrt(variance)>0?((mean-rfDaily)/Math.sqrt(variance))*Math.sqrt(252):null;
          let beta=null;
          if(mrets&&mrets.length>=rets.length){
            const mr=mrets.slice(-rets.length),pr=rets.slice(-mr.length);
            const n=Math.min(pr.length,mr.length);
            const mMean=mr.slice(0,n).reduce((a,b)=>a+b,0)/n,pMean=pr.slice(0,n).reduce((a,b)=>a+b,0)/n;
            let cov=0,mVar=0;
            for(let i=0;i<n;i++){cov+=(pr[i]-pMean)*(mr[i]-mMean);mVar+=(mr[i]-mMean)**2;}
            if(mVar>0) beta=cov/mVar;
          }
          return {sharpe,beta};

          return {h,candles:candles||[]};

        const valid=results.filter(r=>r.status==="fulfilled"&&r.value.candles.length>=5).map(r=>r.value);
        const newHoldingMetrics={};
        for(const {h,candles} of valid){
          const pts=candles.map(x=>x.c);
          const rets=pts.slice(1).map((c,i)=>(c-pts[i])/pts[i]);
          newHoldingMetrics[h.ticker]=computeMetrics(rets,spxRets);
        }
        setHoldingRiskMetrics(newHoldingMetrics);
        // Portfolio-level: value-weighted daily returns
        if(valid.length>=1){
          const minLen=Math.min(...valid.map(v=>v.candles.length));
          if(minLen>=5){
            const portRets=Array.from({length:minLen-1},(_,i)=>{
              let pRet=0,totalW=0;
              for(const {h,candles} of valid){
                const c1=candles[candles.length-minLen+i],c2=candles[candles.length-minLen+i+1];
                if(c1?.c&&c2?.c){const w=h.qty*c1.c;pRet+=w*(c2.c-c1.c)/c1.c;totalW+=w;}
              }
              return totalW>0?pRet/totalW:0;
            });
            const mean=portRets.reduce((a,b)=>a+b,0)/portRets.length;
            const variance=portRets.reduce((a,b)=>a+(b-mean)**2,0)/portRets.length;
            const vol=Math.sqrt(variance)*Math.sqrt(252)*100;
            const {sharpe,beta}=computeMetrics(portRets,spxRets);
            setRiskMetrics({sharpe,beta,volatility:vol});

                        e("div",{style:{display:"flex",gap:"16px",fontSize:"11px"}},
                          e("span",{style:{color:C.up}},e("b",null,rec.strongBuy||0)," Strong Buy"),
                          e("span",{style:{color:C.up}},e("b",null,rec.buy||0)," Buy"),
                          e("span",{style:{color:C.warn}},e("b",null,rec.hold||0)," Hold"),
                          e("span",{style:{color:C.dn}},e("b",null,rec.sell||0)," Sell"),
                          e("span",{style:{color:C.dn}},e("b",null,rec.strongSell||0)," Strong Sell")
                        )
                      );
                    })(),
                    pt&&e("div",{style:{border:`1px solid ${C.border}`,borderRadius:"8px",overflow:"hidden"}},
                      e("div",{style:{fontSize:"9px",fontWeight:"700",color:C.faint,letterSpacing:"0.08em",textTransform:"uppercase",padding:"8px 12px",background:C.surfaceAlt,borderBottom:`1px solid ${C.border}`}},"Price Target"),
                      e("div",{style:{padding:"12px"}},
                        e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"8px"}},
                          e("div",{style:{textAlign:"center"}},e("div",{style:{fontSize:"10px",color:C.faint}},"Low"),e("div",{style:{fontSize:"14px",fontWeight:"700",color:C.dn}},"$"+$n(pt.targetLow))),
                          e("div",{style:{textAlign:"center"}},e("div",{style:{fontSize:"10px",color:C.faint}},"Average"),e("div",{style:{fontSize:"18px",fontWeight:"700",color:C.accent}},"$"+$n(pt.targetMean))),
                          e("div",{style:{textAlign:"center"}},e("div",{style:{fontSize:"10px",color:C.faint}},"High"),e("div",{style:{fontSize:"14px",fontWeight:"700",color:C.up}},"$"+$n(pt.targetHigh)))
                        ),
                        price&&pt.targetMean&&e("div",{style:{fontSize:"11px",color:C.muted,textAlign:"center"}},
                          "Upside from current: ",
                          e("span",{style:{fontWeight:"700",color:pt.targetMean>price?C.up:C.dn}},
                            (pt.targetMean>price?"+":"")+$n((pt.targetMean-price)/price*100,1)+"%")
                        )
                      )
                    ),
                    !rec&&!pt&&e("div",{style:{fontSize:"12px",color:C.muted,padding:"30px 0",textAlign:"center"}},"No analyst data available")
                  );
                })()
              );

              // ── News tab ──
              if(activeTab==="news") return e("div",null,
                tabBar,
                cdStatus,
                cd&&!cd.loading&&(()=>{
                  // Finnhub news → NewsRow format
                  const fhItems=(cd.news||[]).map(n=>{
                    const ts=(n.datetime||0)*1000;
                    return {headline:n.headline,source:n.source,time:fmtNewsTime(ts),_ts:ts,link:n.url,sentiment:sentimentOf(n.headline+" "+(n.summary||""))};
                  });
                  // Google News from watchlist feed (if already fetched)
                  const gnItems=news?.watchlist?.[portfolioModal.ticker]||[];
                  // Merge and sort by time descending
                  const allItems=[...fhItems,...gnItems].sort((a,b)=>(b._ts||0)-(a._ts||0));
                  if(!allItems.length) return e("div",{style:{fontSize:"12px",color:C.muted,padding:"30px 0",textAlign:"center"}},"No recent news");
                  return e("div",{style:{borderRadius:"8px",overflow:"hidden"}},
                    allItems.map((n,i)=>e(NewsRow,{key:i,item:n}))
                  );
                })()
              );

              // ── Holders tab ──
              if(activeTab==="holders") return e("div",null,
                tabBar,
                cdStatus,
                cd&&!cd.loading&&(()=>{
                  const items=cd.holders||[];
                  if(!items.length) return e("div",{style:{fontSize:"12px",color:C.muted,padding:"30px 0",textAlign:"center"}},"No holder data available");
                  return e("div",{style:{border:`1px solid ${C.border}`,borderRadius:"8px",overflow:"hidden"}},
                    e("div",{style:{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:"1px",background:C.border}},
                      ["Fund / Institution","Shares","% Held"].map((h,i)=>e("div",{key:i,style:{background:C.surfaceAlt,padding:"6px 10px",fontSize:"9px",fontWeight:"700",color:C.faint,textTransform:"uppercase",letterSpacing:"0.07em"}},h)),
                      items.map((h,i)=>[
                        e("div",{key:i+"n",style:{background:C.surface,padding:"7px 10px",fontSize:"12px",color:C.text,fontWeight:"500"}},h.name),
                        e("div",{key:i+"s",style:{background:C.surface,padding:"7px 10px",fontSize:"12px",color:C.muted}},h.share?.toLocaleString()||"—"),
                        e("div",{key:i+"p",style:{background:C.surface,padding:"7px 10px",fontSize:"12px",color:C.text,fontWeight:"600"}},h.sharePercent!=null?$n(h.sharePercent,2)+"%":"—"),
                      ])
                    )
                  );
                })()
              );

              // ── Profile tab ──
              if(activeTab==="profile") return e("div",null,
                tabBar,
                cdStatus,
                cd&&!cd.loading&&(()=>{
                  const fd2=fundamentals[portfolioModal.ticker];
                  return e("div",null,
                    cd.description&&e("p",{style:{fontSize:"12px",color:C.muted,lineHeight:"1.65",marginTop:0,marginBottom:"14px"}},cd.description),
                    e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1px",border:`1px solid ${C.border}`,borderRadius:"8px",overflow:"hidden",marginBottom:"14px"}},
                      [
                        cd.ceo&&["CEO",cd.ceo],
                        cd.employees&&["Employees",Number(cd.employees).toLocaleString()],
                        fd2?.sector&&["Sector",fd2.sector],
                        fd2?.industry&&["Industry",fd2.industry],
                        fd2?.location&&["HQ",fd2.location],
                        cd.ipo&&["IPO Date",cd.ipo],
                        cd.website&&["Website",cd.website],
                      ].filter(Boolean).map(([label,value],i)=>e("div",{key:i,style:{background:C.surface,padding:"8px 12px",borderBottom:`1px solid ${C.border}`}},
                        e("div",{style:{fontSize:"9px",color:C.faint,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"2px"}},label),
                        label==="Website"
                          ?e("a",{href:value,target:"_blank",rel:"noopener noreferrer",style:{fontSize:"12px",color:C.accent,textDecoration:"none"}},value.replace(/^https?:\/\/(www\.)?/,"").replace(/\/$/,""))
                          :e("div",{style:{fontSize:"12px",color:C.text,fontWeight:"500"}},value)
                      ))
                    ),
                    (cd.filings||[]).length>0&&e("div",null,
                      e("div",{style:{fontSize:"9px",fontWeight:"700",color:C.faint,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"6px"}},"Recent SEC Filings"),
                      e("div",{style:{border:`1px solid ${C.border}`,borderRadius:"8px",overflow:"hidden"}},
                        (cd.filings||[]).map((f,i)=>e("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 12px",background:C.surface,borderBottom:i<cd.filings.length-1?`1px solid ${C.border}`:"none"}},
                          e("span",{style:{fontSize:"12px",fontWeight:"600",color:C.text}},f.form),
                          e("span",{style:{fontSize:"11px",color:C.muted}},f.filedDate?.slice(0,10)||"")
                        ))
                      )
                    )
                  );
                })()
              );

              return null;
            })()
          )
        ),

        // ── Market Chart Modal ──
        marketChartModal&&e("div",{style:{position:"fixed",inset:0,zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(15,23,42,0.82)"},onClick:()=>setMarketChartModal(null)},
          e("div",{onClick:ev=>ev.stopPropagation(),style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"8px",padding:"1.25rem",width:"900px",maxWidth:"96vw",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 0 0 1px rgba(255,140,0,0.15),0 32px 64px rgba(0,0,0,0.8)"}},
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},
              e("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
                e("span",{style:{background:C.accentBg,color:C.accent,padding:"3px 10px",borderRadius:"8px",fontWeight:"700",fontSize:"13px",border:`1px solid ${C.accentMuted}`}},marketChartModal.name),
                (()=>{
                  const series=marketChartModal.series;
                  const firstPrice=series&&series.length>1?series[0]:null;
                  const lastPrice=marketChartModal.modalLastPrice||(series?.length>0?series[series.length-1]:null);
                  if(!lastPrice)return null;
                  const chg=firstPrice?lastPrice-firstPrice:0;
                  const chgPct=firstPrice?chg/firstPrice*100:0;
                  const isUp=chg>=0;
                  return e(F,null,
                    e("span",{style:{fontSize:"18px",fontWeight:"700",color:C.text,fontVariantNumeric:"tabular-nums"}},"$"+$n(lastPrice)),
                    firstPrice&&e("span",{style:{fontSize:"12px",color:isUp?C.up:C.dn,fontWeight:"600"}},
                      (isUp?"▲":"▼")+" "+(isUp?"+":"-")+"$"+$n(Math.abs(chg))+" ("+(isUp?"+":"-")+Math.abs(chgPct).toFixed(1)+"%)")
                  );
                })()
              ),
              e("button",{onClick:()=>setMarketChartModal(null),style:{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"16px",padding:"2px 6px"}},"✕")
            ),
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},
              e("div",{style:{display:"flex",gap:"2px"}},
                ["line","candle"].map(ct=>e("button",{key:ct,onClick:()=>setChartType(ct),
                  style:{padding:"3px 9px",border:`1px solid ${chartType===ct?C.accent:C.border}`,borderRadius:"8px",cursor:"pointer",
                    background:chartType===ct?C.accentBg:"transparent",color:chartType===ct?C.accent:C.muted,
                    fontSize:"11px",fontFamily:"inherit",fontWeight:chartType===ct?"600":"400",textTransform:"capitalize"}},ct))
              ),
              e("div",{style:{display:"flex",gap:"2px"}},
                PERIODS.map(p=>e("button",{key:p,
                  onClick:()=>{
                    setMarketChartModal(prev=>prev?{...prev,period:p,series:null,timestamps:null,ohlc:null,loading:true}:prev);
                    fetchMarketChart(marketChartModal.ticker,marketChartModal.stooqSym,p);
                  },
                  style:{padding:"3px 9px",border:`1px solid ${marketChartModal.period===p?C.accent:C.border}`,borderRadius:"8px",cursor:"pointer",
                    background:marketChartModal.period===p?C.accentBg:"transparent",color:marketChartModal.period===p?C.accent:C.muted,
                    fontSize:"11px",fontFamily:"inherit",fontWeight:marketChartModal.period===p?"600":"400"}},p))
              )
            ),
            marketChartModal.loading
              ?e("div",{style:{height:320,display:"flex",alignItems:"center",justifyContent:"center"}},
                 e("div",{style:{width:"14px",height:"14px",border:`2px solid ${C.border}`,borderTop:`2px solid ${C.accent}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}))
              :(()=>{
                  const _ms=marketChartModal.series;
                  // 1D: compare last candle vs first candle of today's session (both from same day, no prevClose skew)
                  // For 1D the series starts at market open so first vs last is correct
                  const isUp=(_ms?.length>1)?(_ms[_ms.length-1]>=_ms[0]):true;
                  const modalColor=isUp?C.up:C.dn;
                  if(chartType==="candle"&&marketChartModal.ohlc?.length>=2)
                    return e(CandlestickChart,{candles:marketChartModal.ohlc,timestamps:marketChartModal.timestamps,period:marketChartModal.period,chartH:320});
                  return e(LargeChart,{pts:marketChartModal.series||[],color:modalColor,timestamps:marketChartModal.timestamps,period:marketChartModal.period,chartH:320,ohlc:marketChartModal.ohlc});
                })()
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(e(FinTrack));
  })();
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
