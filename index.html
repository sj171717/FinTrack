    // Our own Netlify serverless proxy — same origin, no CORS, fast
    async function fetchViaProxy(url, timeoutMs=12000) {
      const endpoint = `/api/proxy?url=${encodeURIComponent(url)}`;
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const r = await fetch(endpoint, { signal: ctrl.signal });
        clearTimeout(t);
        if (!r.ok) throw new Error(r.status);
        const txt = await r.text();
        if (!txt || txt.length < 10) throw new Error("empty");
        return txt;
      } catch (err) {
        clearTimeout(t);
        throw err;
      }
    }
    // ── Yahoo Finance quotes — always via our Netlify proxy (server-side, no CORS) ──
    async function yfQuote(symbols) {
      // Try Yahoo Finance v7 quote first (has regularMarketPrice + postMarketPrice)
      // Falls back to Stooq daily candles if Yahoo is blocked
      const out={};
      // Try Yahoo v7 batch quote via proxy
      try{
        const url=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols.map(s=>encodeURIComponent(s)).join(",")}&fields=regularMarketPrice,regularMarketChangePercent,postMarketPrice,postMarketChangePercent`;
        const txt=await fetchViaProxy(url,10000);
        const data=JSON.parse(txt);
        const results=data?.quoteResponse?.result||[];
        for(const r of results){
          // Use post-market price if available (after-hours), else regular market
          const price=r.postMarketPrice||r.regularMarketPrice;
          const changePct=r.postMarketPrice
            ?((r.postMarketPrice-r.regularMarketPrice)/r.regularMarketPrice*100)
            :(r.regularMarketChangePercent||0);
          if(price) out[r.symbol]={price,changePct,isPostMarket:!!r.postMarketPrice};
        }
      }catch{}
      // Stooq fallback for any symbols not resolved
      const missing=symbols.filter(s=>!out[s]);
      await Promise.allSettled(missing.map(async sym=>{
        try{
          const stooqSym=sym.startsWith("^")?sym.slice(1).toLowerCase():sym.toLowerCase()+".us";
          let c=null;
          try{c=await stooqCandles(stooqSym,"1W");}catch{}
          if(!c?.length) try{c=await yfCandles(sym,"1M");}catch{}
          if(c&&c.length>=2){
            const last=c[c.length-1],prev=c[c.length-2];
            const ch=last.c-prev.c;
            out[sym]={price:last.c,change:ch,changePct:prev.c?(ch/prev.c)*100:0};
          }
        }catch{}
      }));
      return out;
    }
    // ── Stooq CSV — free historical OHLCV, no API key, fetched via proxy ──
    async function stooqCandles(stooqSym, period) {
      const daysMap = {"1D":3,"5D":10,"1W":10,"1M":35,"6M":185,"YTD":370,"1Y":370,"2Y":740,"3Y":1095,"5Y":1830,"MAX":3660};
      const days = daysMap[period] || 35;
      const end = new Date(), start = new Date(+end - days*86400000);
      const fmt = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
      // Do NOT encodeURIComponent the symbol — ^ chars get double-encoded through proxies
      const url = `https://stooq.com/q/d/l/?s=${stooqSym}&d1=${fmt(start)}&d2=${fmt(end)}&i=d`;
      const csv = await fetchViaProxy(url, 12000);
      const lines = csv.trim().split('\n');
      if (lines.length < 2 || !lines[0].toLowerCase().includes('date')) throw new Error("bad data");
      return lines.slice(1).map(line => {
        const [date,o,h,l,c,v] = line.split(',');
        const ts = new Date(date).getTime();
        return {o:+o||null, h:+h||null, l:+l||null, c:+c||null, v:+(v||0), ts};
      }).filter(x => x.c && !isNaN(x.c) && x.ts && !isNaN(x.ts));
    }

    // ── Yahoo Finance v8 chart — tries direct then CORS proxy ──
    async function yfCandles(ticker, period) {
      const rangeMap={"1D":"1d","5D":"5d","1W":"5d","1M":"1mo","6M":"6mo","YTD":"ytd","1Y":"1y","2Y":"2y","3Y":"5y","5Y":"5y","MAX":"max"};
      const intMap={"1D":"5m","5D":"1d","1W":"1d","1M":"1d","6M":"1d","YTD":"1d","1Y":"1d","2Y":"1wk","3Y":"1wk","5Y":"1wk","MAX":"1mo"};
      const range=rangeMap[period]||"1mo";
      const interval=intMap[period]||"1d";
      const url1=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=${interval}&range=${range}&includePrePost=false`;
      const url2=`https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=${interval}&range=${range}&includePrePost=false`;
      let txt;
      try{txt=await fetchViaProxy(url1,14000);}catch{txt=await fetchViaProxy(url2,14000);}
      const data=JSON.parse(txt);
      const result=data?.chart?.result?.[0];
      if(!result?.timestamp)throw new Error("no data");
      const ts=result.timestamp;
      const q=result.indicators?.quote?.[0]||{};
      return ts.map((t,i)=>({o:q.open?.[i]||null,h:q.high?.[i]||null,l:q.low?.[i]||null,c:q.close?.[i]||null,v:q.volume?.[i]||0,ts:t*1000})).filter(x=>x.c!=null&&!isNaN(x.c)&&!(x.o===x.h&&x.h===x.l&&x.l===x.c&&x.v===0));
    }

    // ── Lot tracking helpers ──
    function computeFromLots(lots, currentPrice) {
      if(!lots||!lots.length) return {avgCost:0,qty:0,realizedGL:0,unrealizedGL:0,active:[]};
      const buys=[...lots.filter(l=>l.type==="buy")].sort((a,b)=>new Date(a.date)-new Date(b.date));
      const sells=[...lots.filter(l=>l.type==="sell")].sort((a,b)=>new Date(a.date)-new Date(b.date));
      const rem=buys.map(b=>({...b,rem:b.qty}));
      let realizedGL=0;
      for(const sell of sells){
        let sq=sell.qty;
        for(const lot of rem){
          if(sq<=0||lot.rem<=0)continue;
          const used=Math.min(sq,lot.rem);
          realizedGL+=(sell.price-lot.price)*used;
          lot.rem-=used; sq-=used;
        }
      }
      const active=rem.filter(l=>l.rem>0);
      const qty=active.reduce((s,l)=>s+l.rem,0);
      const cost=active.reduce((s,l)=>s+l.price*l.rem,0);
      const avgCost=qty>0?cost/qty:0;
      const unrealizedGL=qty*(currentPrice-avgCost);
      return {avgCost,qty,realizedGL,unrealizedGL,active};
    }

    // ── Sentiment from headline text (no AI needed) ──
    const sentimentOf = text => {
      const t = text.toLowerCase();
      const bull = ["rises","gains","surges","beats","upgrade","buy","growth","record","strong","rally","soars","jumps","profit","outperform","positive","boost","higher","climbs","expands","breakthrough"];
      const bear = ["falls","drops","plunges","misses","downgrade","sell","decline","loss","weak","slumps","crashes","warn","concern","risk","cut","lower","shrinks","layoff","negative","trouble"];
      const b = bull.filter(w=>t.includes(w)).length;
      const d = bear.filter(w=>t.includes(w)).length;
      return b>d?"bullish":d>b?"bearish":"neutral";
    };

    // ── Parse Yahoo Finance RSS XML ──
    const parseRSS = (xml, max=3) => {
      try {
        const doc = new DOMParser().parseFromString(xml,"text/xml");
        return [...doc.querySelectorAll("item")].slice(0,max).map(item=>{
          const headline = item.querySelector("title")?.textContent||"";
          const raw      = item.querySelector("description")?.textContent||"";
          const summary  = raw.replace(/<[^>]*>/g,"").replace(/&[a-z]+;/g," ").trim().slice(0,120);
          const pub      = item.querySelector("pubDate")?.textContent||"";
          const time     = pub ? new Date(pub).toLocaleDateString("en-US",{month:"short",day:"numeric"})+" · "+new Date(pub).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}) : "";
          const link     = item.querySelector("link")?.textContent||"";
          return { headline, summary, source:"Google News", time, link, sentiment:sentimentOf(headline+" "+summary) };
        });
      } catch { return []; }
    };

    // ── storage bridge (Claude artifact + browser localStorage) ──

      set(key,value) {
        if (window.storage && typeof window.storage.set==="function") return window.storage.set(key,value);
        try { localStorage.setItem(key,value); } catch {}
        return Promise.resolve();
      }
    };

              e("path",{fill:"#FFC107",d:"M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"}),

              e("path",{fill:"#4CAF50",d:"M24 44c5.2 0 9.9-1.9 13.5-5L31.1 33c-2 1.4-4.5 2-7.1 2-5.3 0-9.7-3-11.3-7.3l-6.6 5.1C9.8 39.5 16.4 44 24 44z"}),
              e("path",{fill:"#1976D2",d:"M43.6 20H24v8h11.3c-.9 2.6-2.7 4.7-5 6l6.4 5.1C40.7 35.6 44 30.2 44 24c0-1.3-.1-2.7-.4-4z"})
            ),

    function FinTrack() {
      // Apply dark/light mode to C on every render (option b)
      const [darkMode,setDarkMode]=useState(false);
      Object.assign(C, darkMode ? C_DARK : C_LIGHT);

      const [isMobile,setIsMobile]=useState(()=>window.innerWidth<=640);
      useEffect(()=>{
        const onResize=()=>setIsMobile(window.innerWidth<=640);
        window.addEventListener("resize",onResize);
        return()=>window.removeEventListener("resize",onResize);
      },[]);

      const [user,setUser]=useState(undefined); // undefined=loading, null=signed out
      const [holdings,setHoldings]=useState(null);
      const [tab,setTab]=useState("news");
      const [showAdd,setShowAdd]=useState(false);
      const [showAddCash,setShowAddCash]=useState(false);
      const [cashAmount,setCashAmount]=useState("");
      const [newRow,setNewRow]=useState({ticker:"",avgCost:"",qty:"",currentPrice:"",ytdStartPrice:"",targetPrice:"",notes:""});
      const [addPriceLoading,setAddPriceLoading]=useState(false);
      const [priceFetchTrigger,setPriceFetchTrigger]=useState(null);
      const dragIdx=useRef(null);
      const [hidden,setHidden]=useState(false);
      const [aiQ,setAiQ]=useState("");
      const [aiResp,setAiResp]=useState(null);
      const [aiLoading,setAiLoading]=useState(false);
      const [news,setNews]=useState(null);
      const [newsLoading,setNewsLoading]=useState(false);
      const [newsFetched,setNewsFetched]=useState(false);
      const [kalshiData,setKalshiData]=useState(null);
      const [kalshiLoading,setKalshiLoading]=useState(false);
      const [kalshiFetched,setKalshiFetched]=useState(false);
      const [priceLoading,setPriceLoading]=useState(false);
      const [priceUpdatedAt,setPriceUpdatedAt]=useState(null);
      const [marketData,setMarketData]=useState(null);
      const [marketLoading,setMarketLoading]=useState(false);
      const [apiKey,setApiKey]=useState("");
      const [showKeyModal,setShowKeyModal]=useState(false);
      const [keyInput,setKeyInput]=useState("");
      const [fundamentals,setFundamentals]=useState({}); // {[ticker]: {pe,eps,revenue,netIncome,marketCap,debtToEquity,roe,loading,error}}

      const [chartType,setChartType]=useState("line");
      const [portfolioModal,setPortfolioModal]=useState(null);
      const [marketChartModal,setMarketChartModal]=useState(null); // {ticker,name,period,series,timestamps,ohlc,modalLastPrice,loading}
      const [holdingSparklines,setHoldingSparklines]=useState({});
      const [portfolioChartPeriod,setPortfolioChartPeriod]=useState("1M");
      const [portfolioChartData,setPortfolioChartData]=useState(null); // {pts,ts}
      const [portfolioChartLoading,setPortfolioChartLoading]=useState(false);
      const [riskMetrics,setRiskMetrics]=useState(null); // {sharpe,beta,volatility}
      const [riskPeriod,setRiskPeriod]=useState("1M");
      const [holdingRiskMetrics,setHoldingRiskMetrics]=useState({}); // {[ticker]:{sharpe,beta}}
      const [strategyNotes,setStrategyNotes]=useState("");
      const [yearGoal,setYearGoal]=useState(null); // % e.g. 15 means 15%
      const [hoveredSector,setHoveredSector]=useState(null);
      const holdingSparklinesRef=useRef(false);
      const [lotsModal,setLotsModal]=useState(null); // {holding, newBuy:{date,price,qty}, newSell:{date,price,qty}}

      // Dark mode body background
      useEffect(()=>{
        document.body.style.background = darkMode
          ? "#070b14"
          : "linear-gradient(135deg,#eef0ff 0%,#f4f6fb 40%,#fafbff 100%)";
        document.body.style.minHeight = "100vh";
      },[darkMode]);

      // Auth state listener
      useEffect(()=>{
        return fbAuth.onAuthStateChanged(u=>{
          setUser(u||null);
          if(!u) setHoldings(null);
        });
      },[]);

      // Load data from Firestore when user signs in (migrate localStorage if first time)
      useEffect(()=>{
        if(!user)return;
        (async()=>{
          try{
            const doc=await fbDb.collection("users").doc(user.uid).get();
            const data=doc.data();
            if(data?.holdings){
              const loaded=data.holdings.map(migrateLegacyHolding);
              setHoldings(loaded);
              // Auto-refresh prices if any non-cash holding has price = 0
              const needsPrice=loaded.filter(h=>h.ticker!=="Cash"&&(!h.currentPrice||h.currentPrice===0));
              if(needsPrice.length>0){
                const tickers=loaded.filter(h=>h.ticker!=="Cash").map(h=>h.ticker);
                yfQuote(tickers).then(quotes=>{
                  setHoldings(prev=>prev.map(h=>{ const q=quotes[h.ticker]; return q?.price>0?{...h,currentPrice:q.price,changePct:q.changePct??0,ytdStartPrice:h.ytdStartPrice||q.price}:h; }));
                }).catch(()=>{});
              }
            } else {
              // First login — try to migrate localStorage data
              try{
                const local=localStorage.getItem("ft-v3");
                const parsed=local?JSON.parse(local).map(migrateLegacyHolding):[];
                setHoldings(parsed);
                if(parsed.length>0) fbDb.collection("users").doc(user.uid).set({holdings:parsed},{merge:true});
              } catch { setHoldings([]); }
            }
            if(data?.notes) setStrategyNotes(data.notes);
            if(data?.yearGoal!=null) setYearGoal(data.yearGoal);
            try{ const k=localStorage.getItem("ft-apikey"); if(k)setApiKey(k); }catch{}
          } catch { setHoldings([]); }
        })();
      },[user]);

      // Save holdings to Firestore on every change
      useEffect(()=>{
        if(!holdings||!user)return;
        fbDb.collection("users").doc(user.uid).set({holdings},{merge:true}).catch(()=>{});
      },[holdings]);



      useEffect(()=>{
        if(!priceFetchTrigger)return;
        const {id,ticker}=priceFetchTrigger;
        setPriceFetchTrigger(null);
        setAddPriceLoading(true);
        (async()=>{
          let price=null,chgPct=0;
          try{const q=await yfQuote([ticker]);price=q[ticker]?.price||null;chgPct=q[ticker]?.changePct??0;}catch{}
          if(price!=null) setHoldings(p=>p.map(h=>h.id===id?{...h,currentPrice:price,changePct:chgPct,ytdStartPrice:h.ytdStartPrice||price}:h));
          setAddPriceLoading(false);
        })();
      },[priceFetchTrigger]);

      useEffect(()=>{
        if(tab==="portfolio"&&holdings){
          fetchHoldingSparklines();
          fetchPortfolioSeries(portfolioChartPeriod);
          fetchRiskMetrics(riskPeriod);
        }
        if(tab==="news"){fetchMarketData();if(holdings){fetchNews();fetchHoldingSparklines();}}
        if(tab==="prediction"){fetchKalshi();}
      },[tab,holdings]);

      useEffect(()=>{
        if(tab==="portfolio"&&holdings){setRiskMetrics(null);fetchPortfolioSeries(portfolioChartPeriod);}
      },[portfolioChartPeriod]);

      useEffect(()=>{
        if(tab==="portfolio"&&holdings){setRiskMetrics(null);setHoldingRiskMetrics({});fetchRiskMetrics(riskPeriod);}
      },[riskPeriod]);



      const upd=(id,f,val)=>setHoldings(p=>p.map(h=>h.id===id?{...h,[f]:val}:h));
      const updAvgCost=(id,val)=>setHoldings(p=>p.map(h=>{
        if(h.id!==id)return h;
        if(h.lots?.length===1){
          const lots=[{...h.lots[0],price:val}];
          const curAvg=h.lots[0].price||val;
          const wasDefault=h.customExit==null||Math.abs(h.customExit-curAvg*DEFAULT_EXIT_PCT)<=0.01;
          return{...h,lots,customExit:wasDefault?val*DEFAULT_EXIT_PCT:h.customExit};
        }
        const wasDefault=h.customExit==null||Math.abs(h.customExit-(h.avgCost||val)*DEFAULT_EXIT_PCT)<=0.01;
        return {...h,avgCost:val,customExit:wasDefault?val*DEFAULT_EXIT_PCT:h.customExit};
      }));
      const del=(id)=>setHoldings(p=>p.filter(h=>h.id!==id));
      const onDragStart=(i)=>{ dragIdx.current=i; };
      const onDragOver=(ev,i)=>{ ev.preventDefault(); if(dragIdx.current===null||dragIdx.current===i)return; setHoldings(p=>{ const a=[...p]; const [mv]=a.splice(dragIdx.current,1); a.splice(i,0,mv); dragIdx.current=i; return a; }); };
      const onDragEnd=()=>{ dragIdx.current=null; };

      // Resolve avgCost/qty from lots for all holdings
      const resolvedHoldings=(holdings||[]).map(h=>{
        if(!h.lots||h.ticker==="Cash")return{...h,realizedGL:0,unrealizedGL:(h.currentPrice-(h.avgCost||0))*(h.qty||0)};
        const c=computeFromLots(h.lots,h.currentPrice);
        return{...h,avgCost:c.avgCost,qty:c.qty,realizedGL:c.realizedGL,unrealizedGL:c.unrealizedGL};
      });

      const totalVal      =resolvedHoldings.reduce((s,h)=>s+h.qty*h.currentPrice,0);
      const totalCost     =resolvedHoldings.reduce((s,h)=>s+h.qty*h.avgCost,0);
      const totalRealized =resolvedHoldings.reduce((s,h)=>s+(h.realizedGL||0),0);
      const totalUnrealized=resolvedHoldings.reduce((s,h)=>s+(h.unrealizedGL||0),0);
      const totalGL       =totalUnrealized+totalRealized;
      // Cost basis = cost of all lots ever bought (open + closed)
      const totalCostBasis=resolvedHoldings.reduce((s,h)=>{
        if(!h.lots?.length) return s+h.qty*(h.avgCost||0);
        return s+(h.lots||[]).reduce((a,l)=>a+l.qty*(l.price||0),0);
      },0);
      const totalGLPct=totalCostBasis?totalGL/totalCostBasis*100:0;
      // YTD: for lot-tracked holdings, use lot purchase date to decide the YTD baseline.
      // Lots bought before Jan 1 → use ytdStartPrice. Lots bought during the year → use lot price.
      const jan1Ms=new Date(new Date().getFullYear(),0,1).getTime();
      const {ytdGL,ytdBase}=(holdings||[]).reduce((acc,rawH)=>{
        if(rawH.ticker==="Cash")return acc;
        const h=resolvedHoldings.find(x=>x.id===rawH.id);
        if(!h)return acc;
        const price=h.currentPrice;
        if(!rawH.lots?.length){
          const sp=rawH.ytdStartPrice??price;
          return {ytdGL:acc.ytdGL+h.qty*(price-sp), ytdBase:acc.ytdBase+h.qty*sp};
        }
        // FIFO remaining lots
        const {active}=computeFromLots(rawH.lots,price);
        let gl=0,base=0;
        for(const lot of active){
          const sp=new Date(lot.date).getTime()<jan1Ms?(rawH.ytdStartPrice??lot.price):lot.price;
          gl+=lot.rem*(price-sp);
          base+=lot.rem*sp;
        }
        return {ytdGL:acc.ytdGL+gl, ytdBase:acc.ytdBase+base};
      },{ytdGL:0,ytdBase:0});
      const ytdPct=ytdBase?ytdGL/ytdBase*100:0;
      const breaches  =resolvedHoldings.filter(h=>h.ticker!=="Cash"&&h.currentPrice<=(h.customExit??h.avgCost*DEFAULT_EXIT_PCT)).length;

      const addRow=async()=>{
        const t=newRow.ticker.trim().toUpperCase();
        if(!t)return;
        const id=t+Date.now();
        const avg=newRow.avgCost?+newRow.avgCost:0;
        const qty=newRow.qty?+newRow.qty:0;
        let cur=newRow.currentPrice?+newRow.currentPrice:0;
        const today=new Date().toISOString().split('T')[0];
        if(t!=="CASH"&&cur===0){
          setAddPriceLoading(true);
          try{const q=await yfQuote([t]);cur=q[t]?.price||0;}catch{}
          setAddPriceLoading(false);
        }
        const lots=avg>0&&qty>0?[{id:id+"_l0",type:"buy",date:today,price:avg,qty}]:[];
        const newHolding={id,ticker:t,currentPrice:cur,ytdStartPrice:newRow.ytdStartPrice?+newRow.ytdStartPrice:cur||0,targetPrice:newRow.targetPrice?+newRow.targetPrice:null,customExit:avg?avg*DEFAULT_EXIT_PCT:null,notes:newRow.notes,lots};
        const updated=[...(holdings||[]),newHolding];
        setHoldings(updated);
        // Also save directly to Firestore so the price is guaranteed to be included
        if(user) fbDb.collection("users").doc(user.uid).set({holdings:updated},{merge:true}).catch(()=>{});
        setNewRow({ticker:"",avgCost:"",qty:"",currentPrice:"",ytdStartPrice:"",targetPrice:"",notes:""});
        setShowAdd(false);
      };

      // ── FUNDAMENTALS: financialdatasets.ai via /api/fundamentals ──
      const fetchFundamentals=async(ticker)=>{
        if(!ticker||ticker==="Cash")return;
        setFundamentals(prev=>({...prev,[ticker]:{...prev[ticker],loading:true,error:null}}));
        try{
          const data=await fetch(`/api/fundamentals?ticker=${encodeURIComponent(ticker)}`).then(r=>r.json());
          if(data.error) setFundamentals(prev=>({...prev,[ticker]:{loading:false,error:data.error}}));
          else setFundamentals(prev=>({...prev,[ticker]:{...data,loading:false,error:null}}));
        }catch(err){
          setFundamentals(prev=>({...prev,[ticker]:{loading:false,error:"Failed to load"}}));
        }
      };

      // ── PRICES: Yahoo Finance (no API key needed) ──
      const fetchPrices=async()=>{
        if(priceLoading||!holdings)return;
        setPriceLoading(true);
        const tickers=holdings.filter(h=>h.ticker!=="Cash").map(h=>h.ticker);
        try{
          const quotes=await yfQuote(tickers);
          setHoldings(prev=>prev.map(h=>{ const q=quotes[h.ticker]; return q?.price>0?{...h,currentPrice:q.price,changePct:q.changePct??0}:h; }));
          setPriceUpdatedAt(new Date());
        }catch{}
        setPriceLoading(false);
      };

      // ── MARKET DATA ──
      const fetchMarketData=async(force=false)=>{
        if(marketLoading)return;
        if(marketData&&!marketData.error&&!force)return;
        setMarketLoading(true);
        setMarketData({indices:INDICES.map(s=>({...s,value:0,change:0,changePct:0})),currencies:CURRENCIES.map(s=>({...s,value:0,changePct:0})),macro:MACRO_DEF.map(s=>({...s,value:0,changePct:0})),yields:YIELD_DEF.map(s=>({...s,value:0,changePct:0}))});
        const upd=(key,yf,d)=>setMarketData(prev=>prev&&!prev.error?{...prev,[key]:prev[key].map(s=>s.yf===yf?{...s,value:d.price||0,change:d.change||0,changePct:d.changePct||0}:s)}:prev);

        // ── Currencies: jsDelivr CDN, always has CORS ──
        (async()=>{try{
          const yest=new Date(Date.now()-86400000).toISOString().split("T")[0];
          const[tod,yes]=await Promise.allSettled([
            fetch("https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json").then(r=>r.json()),
            fetch(`https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${yest}/v1/currencies/usd.json`).then(r=>r.json()),
          ]);
          const tr=tod.status==="fulfilled"?tod.value?.usd:null,yr=yes.status==="fulfilled"?yes.value?.usd:null;
          if(!tr)throw new Error();
          const pct=(a,b)=>a&&b?((a-b)/b)*100:0;
          upd("currencies","EURUSD=X",{price:tr.eur?1/tr.eur:0,changePct:pct(tr.eur&&1/tr.eur,yr?.eur&&1/yr.eur)});
          upd("currencies","GBPUSD=X",{price:tr.gbp?1/tr.gbp:0,changePct:pct(tr.gbp&&1/tr.gbp,yr?.gbp&&1/yr.gbp)});
          upd("currencies","USDJPY=X",{price:tr.jpy||0,changePct:pct(tr.jpy,yr?.jpy)});
          upd("currencies","TWDUSD=X",{price:tr.twd||0,changePct:pct(tr.twd,yr?.twd)});
        }catch{}})();

        // ── Indices + Macro: use yfCandles (same path as sparklines — proven to work) ──
        const allDefsIM=[...INDICES,...MACRO_DEF,...YIELD_DEF];
        const getQuote=async(yfsym)=>{
          const stooqSym=yfsym.startsWith("^")?yfsym.slice(1).toLowerCase():yfsym.toLowerCase()+".us";
          let c=null;
          try{c=await stooqCandles(stooqSym,"1W");}catch{}
          if(!c?.length) try{c=await yfCandles(yfsym,"1M");}catch{}
          if(!c||c.length<2)throw new Error("no data");
          const last=c[c.length-1],prev=c[c.length-2];
          const ch=last.c-prev.c;
          return{price:last.c,change:ch,changePct:prev.c?(ch/prev.c)*100:0};
        };
        await Promise.allSettled(allDefsIM.map(async s=>{
          const key=INDICES.includes(s)?"indices":YIELD_DEF.includes(s)?"yields":"macro";
          try{upd(key,s.yf,await getQuote(s.yf));}catch{}
        }));

        setMarketData(prev=>{if(!prev||prev.error)return{error:true};return[...prev.indices,...prev.currencies,...prev.macro].some(s=>s.value>0)?prev:{error:true};});
        setMarketLoading(false);
      };



      // ── PORTFOLIO CHART: Stooq first (reliable), Yahoo fallback ──
      const fetchPortfolioChart=async(ticker,period)=>{
        try {
          const stooqSym=ticker.toLowerCase()+".us";
          let candles=null;
          if(period==="1D"){
            // For 1D, Yahoo Finance returns intraday (5-min) candles — use it directly for live price
            try{candles=await yfCandles(ticker,"1D");}catch{}
            if(!candles?.length) try{candles=await stooqCandles(stooqSym,"1D");}catch{}
          } else {
            try{candles=await stooqCandles(stooqSym,period);}catch{}
            if(!candles?.length) try{candles=await yfCandles(ticker,period);}catch{}
          }
          if(!candles?.length)throw new Error("no data");
          const closes=candles.map(x=>x.c);
          const modalLastPrice=closes[closes.length-1];
          setPortfolioModal(prev=>prev&&prev.ticker===ticker?{...prev,series:closes,timestamps:candles.map(x=>x.ts),ohlc:candles,modalLastPrice,loading:false}:prev);
        } catch {
          setPortfolioModal(prev=>prev&&prev.ticker===ticker?{...prev,series:[],timestamps:[],ohlc:[],loading:false}:prev);
        }
      };

      // ── MARKET CHART MODAL ──
      const fetchMarketChart=async(ticker,stooqSym,period)=>{
        try {
          let candles=null;
          if(period==="1D"){
            try{candles=await yfCandles(ticker,"1D");}catch{}
            if(!candles?.length) try{candles=await stooqCandles(stooqSym,"1D");}catch{}
          } else {
            try{candles=await stooqCandles(stooqSym,period);}catch{}
            if(!candles?.length) try{candles=await yfCandles(ticker,period);}catch{}
          }
          if(!candles?.length)throw new Error("no data");
          const closes=candles.map(x=>x.c);
          const modalLastPrice=closes[closes.length-1];
          setMarketChartModal(prev=>prev&&prev.ticker===ticker?{...prev,series:closes,timestamps:candles.map(x=>x.ts),ohlc:candles,modalLastPrice,loading:false}:prev);
        } catch {
          setMarketChartModal(prev=>prev&&prev.ticker===ticker?{...prev,series:[],timestamps:[],ohlc:[],modalLastPrice:null,loading:false}:prev);
        }
      };

      // ── NEWS ──
      const fetchNews=async(force=false)=>{
        if(newsLoading||(newsFetched&&!force))return;
        setNewsLoading(true);
        setNews({market:[],watchlist:{}});
        const tickers=holdings?holdings.filter(h=>h.ticker!=="Cash").map(h=>h.ticker):[];
        const ts=Date.now();
        const urls=[GN_MKT_URL(),...tickers.map(t=>`https://news.google.com/rss/search?q=${encodeURIComponent(t)}+stock+when%3A1d&hl=en-US&gl=US&ceid=US:en&_=${ts}`)];
        const results=await Promise.all(urls.map((url,i)=>fetchNewsItems(url,i===0?6:3)));
        const market=results[0]||[];
        const watchlist={};
        tickers.forEach((t,i)=>{ const items=results[i+1]; if(items?.length)watchlist[t]=items; });
        setNews({market,watchlist});
        setNewsLoading(false);
        if(market.length>0||Object.keys(watchlist).length>0) setNewsFetched(true);
      };

      // ── KALSHI PREDICTION MARKETS ──
      const fetchKalshi=async(force=false)=>{
        if(kalshiLoading||(kalshiFetched&&!force))return;
        setKalshiLoading(true);
        const FIN_SERIES=["KXBTCD","KXBTCMAXY","KXBTCMINY","KXBTC2026200","KXINXMINY","KXINXU","KXINXPOS","KXNASDAQ100","KXNASDAQ100U","KXCREDITRATING","KXNASDAQ100POS"];
        const ECON_SERIES=["KXFED","KXGDP","KXMORTGAGERATE","KXECONPATH","KXCPIYOY","KXECONSTATCPIYOY","KXEFFTARIFF","KXTARIFFRATEPRC","KXRATECUT","KXECONSTATU3"];
        const fetchSeries=async(s)=>{
          const url=`https://api.elections.kalshi.com/trade-api/v2/markets?status=open&limit=20&series_ticker=${s}`;
          try{
            let data=null;
            try{const r=await fetch(url,{headers:{accept:"application/json"}});if(r.ok)data=await r.json();}catch{}
            if(!data?.markets?.length){try{data=JSON.parse(await fetchViaProxy(url));}catch{}}
            return (data?.markets||[]).map(m=>({...m,_series:s}));
          }catch{return[];}
        };
        const groupByEvent=markets=>{
          const map={};
          for(const m of markets){
            const et=m.event_ticker||m.ticker;
            if(!map[et])map[et]={event_ticker:et,series:m._series,markets:[],totalVol:0};
            map[et].markets.push(m);
            map[et].totalVol+=parseFloat(m.volume_fp||0);
          }
          return Object.values(map);
        };
        const[finResults,econResults]=await Promise.all([
          Promise.all(FIN_SERIES.map(fetchSeries)),
          Promise.all(ECON_SERIES.map(fetchSeries)),
        ]);
        // Pick best event per series first (prevents one series dominating), then top 6
        const bestPerSeries=markets=>{
          const bySeries={};
          for(const ev of groupByEvent(markets)){
            if(!bySeries[ev.series]||ev.totalVol>bySeries[ev.series].totalVol)bySeries[ev.series]=ev;
          }
          return Object.values(bySeries).sort((a,b)=>b.totalVol-a.totalVol).slice(0,6);
        };
        const finEvents=bestPerSeries(finResults.flat());
        const econEvents=bestPerSeries(econResults.flat());
        setKalshiData({finance:finEvents,economics:econEvents,total:finEvents.length+econEvents.length});
        setKalshiFetched(true);

      // ── HOLDING SPARKLINES: always refresh all tickers for up-to-date price/pct ──
      const fetchHoldingSparklines=async()=>{
        if(holdingSparklinesRef.current||!holdings)return;

        const allTickers=holdings.filter(h=>h.ticker!=="Cash").map(h=>h.ticker);

        await Promise.allSettled(missing.map(async t=>{
          try {
            const stooqSym = t.startsWith("^") ? t.slice(1).toLowerCase() : t.toLowerCase()+".us";
            let candles=null;
            try{candles=await stooqCandles(stooqSym,"1M");}catch{}
            if(!candles?.length) try{candles=await yfCandles(t,"1M");}catch{}
            if(!candles?.length||candles.length<2)return;
            const pts=candles.map(x=>x.c);
            const timestamps=candles.map(x=>x.ts);
            const price=pts[pts.length-1];
            const pct=pts[0]?((price-pts[0])/pts[0])*100:0;
            const dailyPct=((pts[pts.length-1]-pts[pts.length-2])/pts[pts.length-2])*100;

      // ── PORTFOLIO VALUE CHART ──
      const fetchPortfolioSeries=async(period)=>{
        const nonCash=resolvedHoldings.filter(h=>h.ticker!=="Cash");
        if(!nonCash.length)return;
        setPortfolioChartLoading(true);

        // For ALL: find the earliest lot purchase date across all holdings
        let fetchPeriod=period;
        let earliestMs=null;
        if(period==="ALL"){
          for(const h of nonCash){
            const dates=(h.lots||[]).map(l=>new Date(l.date).getTime()).filter(t=>!isNaN(t));
            if(dates.length) earliestMs=earliestMs?Math.min(earliestMs,...dates):Math.min(...dates);
          }
          // Map earliest date to a YF period string
          if(earliestMs){
            const daysAgo=(Date.now()-earliestMs)/86400000;
            if(daysAgo<=35)      fetchPeriod="1M";
            else if(daysAgo<=185) fetchPeriod="6M";
            else if(daysAgo<=370) fetchPeriod="1Y";
            else if(daysAgo<=740) fetchPeriod="2Y";
            else if(daysAgo<=1830)fetchPeriod="5Y";
            else                  fetchPeriod="MAX";
          } else { fetchPeriod="MAX"; }
        }

        const results=await Promise.allSettled(nonCash.map(async h=>{
          let candles=null;
          try{candles=await yfCandles(h.ticker,fetchPeriod);}catch{}
          if(!candles?.length) try{candles=await stooqCandles(h.ticker.toLowerCase()+".us",fetchPeriod);}catch{}
          return {h,candles:candles||[]};
        }));
        const valid=results.filter(r=>r.status==="fulfilled"&&r.value.candles.length>=2).map(r=>r.value);
        if(!valid.length){setPortfolioChartLoading(false);return;}

        // For ALL: trim each holding's candles to start from its own purchase date
        if(period==="ALL"&&earliestMs){
          for(const v of valid){
            const h=v.h;
            const dates=(h.lots||[]).map(l=>new Date(l.date).getTime()).filter(t=>!isNaN(t));
            const buyMs=dates.length?Math.min(...dates):earliestMs;
            // Keep only candles on or after this holding's purchase date
            // Before purchase date, holding contributes 0 to portfolio value
            v.buyMs=buyMs;
          }
        }

        // Align all series to the same timestamps using the shortest common range
        const minLen=Math.min(...valid.map(v=>v.candles.length));
        const cash=resolvedHoldings.find(h=>h.ticker==="Cash")?.qty||0;
        const alignedTs=valid[0].candles.slice(-minLen).map(c=>c.ts);

        // Build raw pts, then trim off leading timestamps where total stock value is near zero
        const rawPts=Array.from({length:minLen},(_,i)=>{
          const ts=alignedTs[i];
          let val=cash;
          for(const {h,candles,buyMs} of valid){
            const c=candles[candles.length-minLen+i];
            if(!buyMs||ts>=buyMs) val+=h.qty*c.c;
          }
          return {ts,val};
        });

        // Find first index where any holding contributes (stock value > 0)
        let startIdx=0;
        for(let i=0;i<rawPts.length;i++){
          let stockVal=0;
          for(const {h,candles,buyMs} of valid){
            const c=candles[candles.length-minLen+i];
            if(!buyMs||rawPts[i].ts>=buyMs) stockVal+=h.qty*c.c;
          }
          if(stockVal>0){startIdx=i;break;}
        }
        const trimmed=rawPts.slice(startIdx);
        const pts=trimmed.map(x=>x.val);
        const trimmedTs=trimmed.map(x=>x.ts);

        setPortfolioChartData({pts,ts:trimmedTs});
        setPortfolioChartLoading(false);
      };

      // ── RISK METRICS: Sharpe, Beta, Volatility for portfolio + each stock ──
      const fetchRiskMetrics=async(period)=>{
        const nonCash=resolvedHoldings.filter(h=>h.ticker!=="Cash");
        if(!nonCash.length)return;
        setRiskMetrics(null);
        setHoldingRiskMetrics({});
        const rfDaily=4.3/100/252;
        // Fetch S&P 500
        let spxCandles=null;
        try{spxCandles=await stooqCandles("^spx",period);}catch{}
        if(!spxCandles?.length) try{spxCandles=await yfCandles("^GSPC",period);}catch{}
        // For 3Y via Yahoo we get 5Y data — trim to ~756 trading days
        if(period==="3Y"&&spxCandles?.length>800) spxCandles=spxCandles.slice(-756);
        const spxPts=spxCandles?.length>=2?spxCandles.map(x=>x.c):null;
        const spxRets=spxPts?spxPts.slice(1).map((c,i)=>(c-spxPts[i])/spxPts[i]):null;
        // Compute helper
        const computeMetrics=(rets,mrets)=>{
          if(!rets||rets.length<5) return {sharpe:null,beta:null};
          const mean=rets.reduce((a,b)=>a+b,0)/rets.length;
          const variance=rets.reduce((a,b)=>a+(b-mean)**2,0)/rets.length;
          const sharpe=Math.sqrt(variance)>0?((mean-rfDaily)/Math.sqrt(variance))*Math.sqrt(252):null;
          let beta=null;
          if(mrets&&mrets.length>=rets.length){
            const mr=mrets.slice(-rets.length),pr=rets.slice(-mr.length);
            const n=Math.min(pr.length,mr.length);
            const mMean=mr.slice(0,n).reduce((a,b)=>a+b,0)/n,pMean=pr.slice(0,n).reduce((a,b)=>a+b,0)/n;
            let cov=0,mVar=0;
            for(let i=0;i<n;i++){cov+=(pr[i]-pMean)*(mr[i]-mMean);mVar+=(mr[i]-mMean)**2;}
            if(mVar>0) beta=cov/mVar;
          }
          return {sharpe,beta};
        };
        // Per-stock metrics
        const results=await Promise.allSettled(nonCash.map(async h=>{
          const stooqSym=h.ticker.toLowerCase()+".us";
          let candles=null;
          try{candles=await stooqCandles(stooqSym,period);}catch{}
          if(!candles?.length) try{candles=await yfCandles(h.ticker,period);}catch{}
          if(period==="3Y"&&candles?.length>800) candles=candles.slice(-756);
          return {h,candles:candles||[]};
        }));
        const valid=results.filter(r=>r.status==="fulfilled"&&r.value.candles.length>=5).map(r=>r.value);
        const newHoldingMetrics={};
        for(const {h,candles} of valid){
          const pts=candles.map(x=>x.c);
          const rets=pts.slice(1).map((c,i)=>(c-pts[i])/pts[i]);
          newHoldingMetrics[h.ticker]=computeMetrics(rets,spxRets);
        }
        setHoldingRiskMetrics(newHoldingMetrics);
        // Portfolio-level: value-weighted daily returns
        if(valid.length>=1){
          const minLen=Math.min(...valid.map(v=>v.candles.length));
          if(minLen>=5){
            const portRets=Array.from({length:minLen-1},(_,i)=>{
              let pRet=0,totalW=0;
              for(const {h,candles} of valid){
                const c1=candles[candles.length-minLen+i],c2=candles[candles.length-minLen+i+1];
                if(c1?.c&&c2?.c){const w=h.qty*c1.c;pRet+=w*(c2.c-c1.c)/c1.c;totalW+=w;}
              }
              return totalW>0?pRet/totalW:0;
            });
            const mean=portRets.reduce((a,b)=>a+b,0)/portRets.length;
            const variance=portRets.reduce((a,b)=>a+(b-mean)**2,0)/portRets.length;
            const vol=Math.sqrt(variance)*Math.sqrt(252)*100;
            const {sharpe,beta}=computeMetrics(portRets,spxRets);
            setRiskMetrics({sharpe,beta,volatility:vol});
          }
        }
      };

                  return e(LargeChart,{pts:marketChartModal.series||[],color:modalColor,timestamps:marketChartModal.timestamps,period:marketChartModal.period,chartH:320,ohlc:marketChartModal.ohlc});
                })()
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(e(FinTrack));
  })();
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
