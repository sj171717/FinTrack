    @keyframes spin  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    input::placeholder { color: #94a3b8; }
    input:focus { border-color: #1d4ed8 !important; box-shadow: 0 0 0 2px rgba(29,78,216,0.15) !important; }
    tr:hover td { background: rgba(29,78,216,0.025); }
    .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; letter-spacing: -0.01em; }

<body>
  <div id="root"><div style="padding:2rem;color:#64748b;font-family:sans-serif">Loading FinTrack…</div></div>
  <script>
  (function () {
    const { useState, useEffect, useRef } = React;
    const e = React.createElement;
    const F = React.Fragment;

    // ── Network helpers ──
    const FH_BASE = "https://finnhub.io/api/v1";
    const GN_MKT_URL = "https://news.google.com/rss/search?q=stock+market+wall+street+S%26P500&hl=en-US&gl=US&ceid=US:en";
    const CORS_PROXIES = [
      u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
      u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
      u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
    ];
    async function fetchViaProxy(url, timeoutMs=10000) {
      const attempt = mk => new Promise((res,rej) => {
        const t = setTimeout(() => rej(new Error("timeout")), timeoutMs);
        fetch(mk(url))
          .then(r => { clearTimeout(t); return r.ok ? r.text() : Promise.reject(); })
          .then(txt => { if(txt && txt.length > 50) res(txt); else rej(); })
          .catch(rej);
      });
      return Promise.any(CORS_PROXIES.map(mk => attempt(mk)));
    }
    // Finnhub direct — used for live quotes (free plan works with ETF/stock symbols)
    async function fhGet(path, params, token) {
      const q = new URLSearchParams({...params, token});
      const r = await fetch(`${FH_BASE}${path}?${q}`, {headers:{accept:"application/json"}});
      if (!r.ok) throw new Error(r.status);
      return r.json();
    }
    // ── Finnhub candles — daily/weekly OHLCV for US stocks/ETFs ──
    async function fhCandles(sym, period, token) {
      const resMap={"1D":"5","5D":"15","1M":"D","6M":"D","YTD":"D","1Y":"D","2Y":"W","5Y":"W","MAX":"M"};
      const daysMap={"1D":3,"5D":8,"1M":35,"6M":185,"YTD":370,"1Y":370,"2Y":750,"5Y":1850,"MAX":3650};
      const res=resMap[period]||"D";
      const days=daysMap[period]||35;
      const to=Math.floor(Date.now()/1000);
      const from=to-days*86400;
      const d=await fhGet("/stock/candle",{symbol:sym,resolution:res,from,to},token);
      if(d.s!=="ok"||!d.c?.length) throw new Error("no data");
      return d.t.map((ts,i)=>({o:d.o[i],h:d.h[i],l:d.l[i],c:d.c[i],v:d.v?.[i]||0,ts:ts*1000}));
    }
    // ── Stooq CSV — free historical OHLCV, no API key, fetched via proxy ──
    async function stooqCandles(stooqSym, period) {
      const daysMap = {"1D":3,"1W":10,"1M":35,"6M":185,"YTD":370,"1Y":370,"2Y":740,"5Y":1830,"MAX":3660};
      const days = daysMap[period] || 35;
      const end = new Date(), start = new Date(+end - days*86400000);
      const fmt = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
      const url = `https://stooq.com/q/d/l/?s=${encodeURIComponent(stooqSym)}&d1=${fmt(start)}&d2=${fmt(end)}&i=d`;
      const csv = await fetchViaProxy(url, 12000);
      const lines = csv.trim().split('\n');
      if (lines.length < 2 || !lines[0].toLowerCase().includes('date')) throw new Error("bad data");
      return lines.slice(1).map(line => {
        const [date,o,h,l,c,v] = line.split(',');
        const ts = new Date(date).getTime();
        return {o:+o||null, h:+h||null, l:+l||null, c:+c||null, v:+(v||0), ts};
      }).filter(x => x.c && !isNaN(x.c) && x.ts && !isNaN(x.ts));
    }

    // ── Yahoo Finance v8 chart — tries direct then CORS proxy ──
    async function yfCandles(ticker, period) {
      const rangeMap={"1D":"1d","5D":"5d","1M":"1mo","6M":"6mo","YTD":"ytd","1Y":"1y","2Y":"2y","5Y":"5y","MAX":"max"};
      const intMap={"1D":"5m","5D":"15m","1M":"1d","6M":"1d","YTD":"1d","1Y":"1d","2Y":"1wk","5Y":"1wk","MAX":"1mo"};
      const range=rangeMap[period]||"1mo";
      const interval=intMap[period]||"1d";
      const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=${interval}&range=${range}&includePrePost=false`;
      let txt;
      try {
        const r=await fetch(url,{headers:{accept:"application/json"}});
        if(!r.ok)throw new Error(r.status);
        txt=await r.text();
      } catch { txt=await fetchViaProxy(url,10000); }
      const data=JSON.parse(txt);
      const result=data?.chart?.result?.[0];
      if(!result?.timestamp)throw new Error("no data");
      const ts=result.timestamp;
      const q=result.indicators?.quote?.[0]||{};
      return ts.map((t,i)=>({o:q.open?.[i]||null,h:q.high?.[i]||null,l:q.low?.[i]||null,c:q.close?.[i]||null,v:q.volume?.[i]||0,ts:t*1000})).filter(x=>x.c!=null&&!isNaN(x.c));
    }

    // ── Lot tracking helpers ──
    function computeFromLots(lots, currentPrice) {
      if(!lots||!lots.length) return {avgCost:0,qty:0,realizedGL:0,unrealizedGL:0,active:[]};
      const buys=[...lots.filter(l=>l.type==="buy")].sort((a,b)=>new Date(a.date)-new Date(b.date));
      const sells=[...lots.filter(l=>l.type==="sell")].sort((a,b)=>new Date(a.date)-new Date(b.date));
      const rem=buys.map(b=>({...b,rem:b.qty}));
      let realizedGL=0;
      for(const sell of sells){
        let sq=sell.qty;
        for(const lot of rem){
          if(sq<=0||lot.rem<=0)continue;
          const used=Math.min(sq,lot.rem);
          realizedGL+=(sell.price-lot.price)*used;
          lot.rem-=used; sq-=used;
        }
      }
      const active=rem.filter(l=>l.rem>0);
      const qty=active.reduce((s,l)=>s+l.rem,0);
      const cost=active.reduce((s,l)=>s+l.price*l.rem,0);
      const avgCost=qty>0?cost/qty:0;
      const unrealizedGL=qty*(currentPrice-avgCost);
      return {avgCost,qty,realizedGL,unrealizedGL,active};
    }
    function migrateLegacyHolding(h) {
      if(h.lots) return h;
      const today=new Date().toISOString().split('T')[0];
      return {...h, lots: h.qty>0?[{id:h.id+"_l0",type:"buy",date:today,price:h.avgCost||0,qty:h.qty||0}]:[]};
    }

    // ── News fetcher: rss2json.com (no CORS proxy) with proxy fallback ──
    async function fetchNewsItems(rssUrl, max=3) {
      try {
        const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
        if(r.ok){
          const data=await r.json();
          if(data.status==="ok"&&data.items?.length>0){
            return data.items.slice(0,max).map(item=>{
              const headline=item.title||"";
              const raw=item.description||"";
              const summary=raw.replace(/<[^>]*>/g,"").replace(/&[a-z]+;/g," ").trim().slice(0,120);
              const time=item.pubDate?new Date(item.pubDate).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"";
              return{headline,summary,source:"Google News",time,link:item.link||"",sentiment:sentimentOf(headline+" "+summary)};
            });
          }
        }
      } catch {}
      // Fallback: CORS proxy + XML
      try { return parseRSS(await fetchViaProxy(rssUrl,10000),max); } catch {}
      return [];
    }

    // ── Market symbols ──
    // fh  = Finnhub ETF proxy symbol (works on free plan for /quote)
    // stooq = Stooq symbol for historical chart data (fetched via proxy, no key)
    const INDICES = [
      { name:"S&P 500",    symbol:"SPX", fh:"SPY",  stooq:"spy.us"  },
      { name:"NASDAQ 100", symbol:"NDX", fh:"QQQ",  stooq:"qqq.us"  },
      { name:"Dow Jones",  symbol:"DJI", fh:"DIA",  stooq:"dia.us"  },
      { name:"FTSE 100",   symbol:"UKX", fh:"EWU",  stooq:"ewu.us"  },
      { name:"Nikkei 225", symbol:"NKY", fh:"EWJ",  stooq:"ewj.us"  },
      { name:"Hang Seng",  symbol:"HSI", fh:"EWH",  stooq:"ewh.us"  },
    ];
    const CURRENCIES = [
      { name:"EUR/USD", fh:"FXE",  stooq:"fxe.us" },
      { name:"GBP/USD", fh:"FXB",  stooq:"fxb.us" },
      { name:"USD/JPY", fh:"FXY",  stooq:"fxy.us" },
    ];
    const MACRO_DEF = [
      { name:"Gold (XAU/USD)",  symbol:"XAU", fh:"GLD", stooq:"gld.us", unit:"USD/oz"     },
      { name:"Crude Oil (WTI)", symbol:"WTI", fh:"USO", stooq:"uso.us", unit:"USD/barrel" },
    ];

    const DEFAULT_EXIT_PCT = 0.85;

    const INITIAL_HOLDINGS = [
      { id:"GOOG",  ticker:"GOOG",  avgCost:169.18, qty:150.33, currentPrice:274.86, ytdStartPrice:315.21,  targetPrice:400.00,  customExit:143.80, notes:"Trimmed 13 shares to fund the GRAB purchase. It is not a massive gain this year, so holding requires patience to hit the $400+ target." },
      { id:"LLY",   ticker:"LLY",   avgCost:763.87, qty:50.23,  currentPrice:883.79, ytdStartPrice:1079.94, targetPrice:1500.00, customExit:649.29, notes:"Solid gain with strong momentum. Holding as the portfolio's anchor. Recent 16-20% pullback driven by four factors: 1) FDA delayed oral weight-loss pill decision to April 10. 2) Rare analyst downgrade (HSBC). 3) Aggressive $449/mo pricing sparking margin concerns. 4) High valuation leaving no room for error." },
      { id:"GLD",   ticker:"GLD",   avgCost:348.20, qty:80.00,  currentPrice:414.36, ytdStartPrice:398.42,  targetPrice:450.00,  customExit:295.97, notes:"Keeping the percentage stable for now to avoid the risk of the market crashing and war." },
      { id:"MSFT",  ticker:"MSFT",  avgCost:407.99, qty:53.09,  currentPrice:357.19, ytdStartPrice:472.77,  targetPrice:550.00,  customExit:345.00, notes:"Bought near the top. Applying a more conservative approach by setting a hard stop-loss at $345." },
      { id:"IONQ",  ticker:"IONQ",  avgCost:37.03,  qty:390.00, currentPrice:27.47,  ytdStartPrice:46.80,   targetPrice:70.00,   customExit:25.00,  notes:"There might be huge gain but high risk as well, therefore the position should not exceed 6% of the entire portfolio." },
      { id:"GRAB",  ticker:"GRAB",  avgCost:4.80,   qty:5590.00,currentPrice:3.56,   ytdStartPrice:5.08,    targetPrice:5.50,    customExit:3.00,   notes:"Strong confidence this is the bottom, backed by JPM & Citi citing mobility cash flow and fintech breaking even. Need to push the holding % to over 15%." },
      { id:"CASH",  ticker:"Cash",  avgCost:1.00,   qty:1409.88,currentPrice:1.00,   ytdStartPrice:1.00,    targetPrice:null,    customExit:null,   notes:"Available for deployment." },
    ];

    // C is module-level, mutated by Object.assign on each render for dark/light mode
    const C = {
      bg:"#edf0f4", panel:"#ffffff", surface:"#ffffff", surfaceAlt:"#f4f6f9",
      border:"#d0d5de", text:"#0d1117", muted:"#57606a", faint:"#c5ccd8",
      accent:"#1d4ed8", accentBg:"#eff6ff", accentMuted:"#93c5fd",
      up:"#0d6b3a", upBg:"#e6f6ec", upBorder:"#a8d5b8",
      dn:"#b91c1c", dnBg:"#fef0f0", dnBorder:"#f5b8b8",
      warn:"#92600a", warnBg:"#fdf6e3", warnBorder:"#e3c97a",
      tag:"#edf0f4", tagText:"#57606a",
    };

    const C_LIGHT = {
      bg:"#edf0f4", panel:"#ffffff", surface:"#ffffff", surfaceAlt:"#f4f6f9",
      border:"#d0d5de", text:"#0d1117", muted:"#57606a", faint:"#c5ccd8",
      accent:"#1d4ed8", accentBg:"#eff6ff", accentMuted:"#93c5fd",
      up:"#0d6b3a", upBg:"#e6f6ec", upBorder:"#a8d5b8",
      dn:"#b91c1c", dnBg:"#fef0f0", dnBorder:"#f5b8b8",
      warn:"#92600a", warnBg:"#fdf6e3", warnBorder:"#e3c97a",
      tag:"#edf0f4", tagText:"#57606a",
    };

    const C_DARK = {
      bg:"#0d1117", panel:"#161b22", surface:"#161b22", surfaceAlt:"#1c2330",
      border:"#21262d", text:"#e6edf3", muted:"#7d8590", faint:"#21262d",
      accent:"#f0883e", accentBg:"rgba(240,136,62,0.12)", accentMuted:"#d1815a",
      up:"#3fb950", upBg:"rgba(63,185,80,0.1)", upBorder:"#238636",
      dn:"#f85149", dnBg:"rgba(248,81,73,0.1)", dnBorder:"#da3633",
      warn:"#d29922", warnBg:"rgba(210,153,34,0.1)", warnBorder:"#9e6a03",
      tag:"#1c2330", tagText:"#7d8590",
    };

    const $n = (n,d=2) => n==null?"—":n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
    const sign = n => n>=0?"+":"−";
    const pc   = n => n>=0?C.up:C.dn;
    const pcBg = n => n>=0?C.upBg:C.dnBg;
    const MASK = "••••••";

    // ── Sentiment from headline text (no AI needed) ──
    const sentimentOf = text => {
      const t = text.toLowerCase();
      const bull = ["rises","gains","surges","beats","upgrade","buy","growth","record","strong","rally","soars","jumps","profit","outperform","positive","boost","higher","climbs","expands","breakthrough"];
      const bear = ["falls","drops","plunges","misses","downgrade","sell","decline","loss","weak","slumps","crashes","warn","concern","risk","cut","lower","shrinks","layoff","negative","trouble"];
      const b = bull.filter(w=>t.includes(w)).length;
      const d = bear.filter(w=>t.includes(w)).length;
      return b>d?"bullish":d>b?"bearish":"neutral";
    };

    // ── Parse Yahoo Finance RSS XML ──
    const parseRSS = (xml, max=3) => {
      try {
        const doc = new DOMParser().parseFromString(xml,"text/xml");
        return [...doc.querySelectorAll("item")].slice(0,max).map(item=>{
          const headline = item.querySelector("title")?.textContent||"";
          const raw      = item.querySelector("description")?.textContent||"";
          const summary  = raw.replace(/<[^>]*>/g,"").replace(/&[a-z]+;/g," ").trim().slice(0,120);
          const pub      = item.querySelector("pubDate")?.textContent||"";
          const time     = pub ? new Date(pub).toLocaleDateString("en-US",{month:"short",day:"numeric"}) : "";
          const link     = item.querySelector("link")?.textContent||"";
          return { headline, summary, source:"Google News", time, link, sentiment:sentimentOf(headline+" "+summary) };
        });
      } catch { return []; }
    };

    // ── storage bridge (Claude artifact + browser localStorage) ──
    const storage = {
      get(key) {
        if (window.storage && typeof window.storage.get==="function") return window.storage.get(key);
        try { const v=localStorage.getItem(key); return Promise.resolve(v?{value:v}:null); } catch { return Promise.resolve(null); }
      },
      set(key,value) {
        if (window.storage && typeof window.storage.set==="function") return window.storage.set(key,value);
        try { localStorage.setItem(key,value); } catch {}
        return Promise.resolve();
      }
    };

    const BS = v => ({
      padding:"7px 16px", border:`1.5px solid ${v==="p"?C.accent:C.border}`, cursor:"pointer", borderRadius:"7px",
      background:v==="p"?C.accent:C.surface, color:v==="p"?"#fff":C.muted,
      fontWeight:v==="p"?"600":"400", fontSize:"12px", fontFamily:"inherit",
    });

    function PnlCell({amount,pct,hidden}) {
      const col=pc(amount);
      if (hidden) return e("div",{style:{textAlign:"right"}},
        e("div",{style:{color:C.faint,fontSize:"12px",letterSpacing:"0.1em"}},MASK),
        e("div",{style:{color:C.faint,fontSize:"10.5px",letterSpacing:"0.1em"}},MASK)
      );
      return e("div",{style:{fontVariantNumeric:"tabular-nums",textAlign:"right"}},
        e("div",{style:{color:col,fontSize:"12px",fontWeight:"500"}},sign(amount)+"$"+$n(Math.abs(amount),0)),
        e("div",{style:{color:col,opacity:0.75,fontSize:"10.5px"}},"("+sign(pct)+$n(Math.abs(pct),1)+"%)")
      );
    }

    function EditCell({value,onSave,prefix="$",align="right",hidden}) {
      const [editing,setEditing]=useState(false);
      const [v,setV]=useState(value);
      const ref=useRef();
      useEffect(()=>{ if(editing&&ref.current)ref.current.focus(); },[editing]);
      const commit=()=>{ setEditing(false); const num=parseFloat(v); if(!isNaN(num))onSave(num); };
      if (hidden) return e("span",{style:{color:C.faint,fontSize:"12px",letterSpacing:"0.1em"}},MASK);
      if (editing) return e("input",{ref,value:v,onChange:ev=>setV(ev.target.value),onBlur:commit,
        onKeyDown:ev=>{if(ev.key==="Enter")commit();if(ev.key==="Escape")setEditing(false);},
        style:{background:C.surface,border:`1.5px solid ${C.accent}`,color:C.text,borderRadius:"5px",padding:"3px 6px",fontSize:"12px",width:"80px",outline:"none",fontFamily:"inherit",textAlign:align,boxShadow:`0 0 0 3px ${C.accentBg}`}
      });
      return e("div",{onClick:()=>{setEditing(true);setV(value);},title:"Click to edit",
        style:{cursor:"text",borderBottom:`1px dashed ${C.faint}`,display:"inline-block",color:C.text,fontSize:"12px",fontVariantNumeric:"tabular-nums"}},
        value!=null?prefix+$n(value):"—"
      );
    }

    function ExitCell({value,current,onSave,hidden}) {
      const breached=current!=null&&current>0&&value>0&&current<=value;
      return e("div",{style:{textAlign:"right"}},
        e(EditCell,{value,onSave,hidden}),
        breached&&e("div",{style:{fontSize:"10px",marginTop:"2px",color:C.dn,fontWeight:"600"}},"⚠ BREACHED")
      );
    }

    function NotesCell({text,onSave}) {
      const [open,setOpen]=useState(false);
      const [editing,setEditing]=useState(false);
      const [v,setV]=useState(text);
      const preview=text?.length>48?text.slice(0,48)+"…":text;
      return e(F,null,
        e("div",{onClick:()=>setOpen(true),style:{cursor:"pointer",color:C.muted,fontSize:"11px",lineHeight:"1.45",maxWidth:"200px",borderBottom:`1px dashed ${C.faint}`}},preview||"—"),
        open&&e("div",{style:{position:"fixed",inset:0,zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(15,23,42,0.45)"},onClick:()=>{setOpen(false);setEditing(false);}},
          e("div",{onClick:ev=>ev.stopPropagation(),style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"6px",padding:"1.5rem",width:"520px",maxWidth:"92vw",boxShadow:"0 20px 60px rgba(0,0,0,0.15)"}},
            e("div",{style:{fontSize:"10px",color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"12px"}},"Notes"),
            editing
              ?e("textarea",{value:v,onChange:ev=>setV(ev.target.value),rows:7,style:{background:C.surfaceAlt,border:`1.5px solid ${C.accent}`,color:C.text,borderRadius:"8px",padding:"10px 12px",fontSize:"13px",width:"100%",outline:"none",resize:"vertical",fontFamily:"inherit",lineHeight:"1.7",boxSizing:"border-box",boxShadow:`0 0 0 3px ${C.accentBg}`}})
              :e("div",{style:{fontSize:"13px",color:C.text,lineHeight:"1.75",whiteSpace:"pre-wrap"}},v||"—"),
            e("div",{style:{display:"flex",gap:"8px",marginTop:"14px"}},
              editing
                ?e(F,null,e("button",{onClick:()=>{onSave(v);setEditing(false);setOpen(false);},style:BS("p")},"Save"),e("button",{onClick:()=>{setV(text);setEditing(false);},style:BS()},"Cancel"))
                :e(F,null,e("button",{onClick:()=>setEditing(true),style:BS("p")},"Edit"),e("button",{onClick:()=>setOpen(false),style:BS()},"Close"))
            )
          )
        )
      );
    }

    const TH=({c,right})=>e("th",{style:{padding:"9px 12px",textAlign:right?"right":"left",color:C.muted,borderBottom:`1px solid ${C.border}`,fontWeight:"500",fontSize:"10px",letterSpacing:"0.07em",textTransform:"uppercase",whiteSpace:"nowrap",background:C.surfaceAlt}},c);
    const TD=({children,right,style:s})=>e("td",{style:{padding:"10px 12px",textAlign:right?"right":"left",borderBottom:`1px solid ${C.border}`,verticalAlign:"middle",...s}},children);

    function MetCard({label,value,color,sub}) {
      return e("div",{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"4px",padding:"10px 14px",flex:"1 1 120px",borderTop:`2px solid ${color||C.accent}`}},
        e("div",{style:{fontSize:"9px",color:C.muted,letterSpacing:"0.09em",textTransform:"uppercase",marginBottom:"5px",fontWeight:"600"}},label),
        e("div",{style:{fontSize:"19px",fontWeight:"700",color:color||C.text,fontVariantNumeric:"tabular-nums",lineHeight:"1",letterSpacing:"-0.02em"}},value),
        sub&&e("div",{style:{fontSize:"10.5px",color:C.muted,marginTop:"4px"}},sub)
      );
    }

    function NewsRow({item}) {
      const sentColor=item.sentiment==="bullish"?C.up:item.sentiment==="bearish"?C.dn:C.warn;
      const sentBg   =item.sentiment==="bullish"?C.upBg:item.sentiment==="bearish"?C.dnBg:C.warnBg;
      const sentBdr  =item.sentiment==="bullish"?C.upBorder:item.sentiment==="bearish"?C.dnBorder:C.warnBorder;

      // Dark mode body background
      useEffect(()=>{ document.body.style.background = darkMode ? "#0d1117" : "#edf0f4"; }, [darkMode]);

      useEffect(()=>{
        (async()=>{
          try {
            const s=await storage.get("ft-v3"); setHoldings((s?JSON.parse(s.value):INITIAL_HOLDINGS).map(migrateLegacyHolding));
            const k=await storage.get("ft-apikey"); if(k?.value)setApiKey(k.value);
            const fk=await storage.get("ft-finnhub"); if(fk?.value)setFinnhubKey(fk.value);
            const n=await storage.get("ft-notes"); if(n?.value)setStrategyNotes(n.value);
          } catch { setHoldings(INITIAL_HOLDINGS); }
        })();
      },[]);

      useEffect(()=>{
        if(!holdings)return;
        storage.set("ft-v3",JSON.stringify(holdings)).catch(()=>{});
      },[holdings]);

      // When finnhubKey arrives (loaded from storage), retry market data if we had a nokey error
      useEffect(()=>{
        if(finnhubKey&&marketData?.error==="nokey") fetchMarketData();
      },[finnhubKey]);

      useEffect(()=>{
        if(tab!=="news"||!marketData||marketData.error)return;
        fetchChartData(selectedChart.stooq,selectedPeriod);
      },[selectedChart.stooq,selectedPeriod,marketData?.error,!!marketData,tab]);

      useEffect(()=>{
        if(!priceFetchTrigger)return;
        const {id,ticker}=priceFetchTrigger;
        setPriceFetchTrigger(null);
        setAddPriceLoading(true);
        (async()=>{
          let price=null;
          try{
            if(finnhubKey){const d=await fhGet("/quote",{symbol:ticker},finnhubKey);price=d.c||null;}
          }catch{}
          if(price!=null) setHoldings(p=>p.map(h=>h.id===id?{...h,currentPrice:price,ytdStartPrice:h.ytdStartPrice||price}:h));
          setAddPriceLoading(false);
        })();
      },[priceFetchTrigger]);

      useEffect(()=>{
        if(tab==="portfolio"&&holdings&&!holdingSparklinesRef.current){
          fetchHoldingSparklines();
        }
        if(tab==="news"){fetchMarketData();if(holdings)fetchNews();}
        if(tab==="prediction"){fetchKalshi();}
      },[tab,holdings]);



      const upd=(id,f,val)=>setHoldings(p=>p.map(h=>h.id===id?{...h,[f]:val}:h));
      const updAvgCost=(id,val)=>setHoldings(p=>p.map(h=>{
        if(h.id!==id)return h;
        if(h.lots?.length===1){
          const lots=[{...h.lots[0],price:val}];
          const curAvg=h.lots[0].price||val;
          const wasDefault=h.customExit==null||Math.abs(h.customExit-curAvg*DEFAULT_EXIT_PCT)<=0.01;
          return{...h,lots,customExit:wasDefault?val*DEFAULT_EXIT_PCT:h.customExit};
        }
        const wasDefault=h.customExit==null||Math.abs(h.customExit-(h.avgCost||val)*DEFAULT_EXIT_PCT)<=0.01;
        return {...h,avgCost:val,customExit:wasDefault?val*DEFAULT_EXIT_PCT:h.customExit};
      }));
      const del=(id)=>setHoldings(p=>p.filter(h=>h.id!==id));
      const onDragStart=(i)=>{ dragIdx.current=i; };
      const onDragOver=(ev,i)=>{ ev.preventDefault(); if(dragIdx.current===null||dragIdx.current===i)return; setHoldings(p=>{ const a=[...p]; const [mv]=a.splice(dragIdx.current,1); a.splice(i,0,mv); dragIdx.current=i; return a; }); };
      const onDragEnd=()=>{ dragIdx.current=null; };

      // Resolve avgCost/qty from lots for all holdings
      const resolvedHoldings=(holdings||[]).map(h=>{
        if(!h.lots||h.ticker==="Cash")return{...h,realizedGL:0,unrealizedGL:(h.currentPrice-(h.avgCost||0))*(h.qty||0)};
        const c=computeFromLots(h.lots,h.currentPrice);
        return{...h,avgCost:c.avgCost,qty:c.qty,realizedGL:c.realizedGL,unrealizedGL:c.unrealizedGL};
      });

      const totalVal  =resolvedHoldings.reduce((s,h)=>s+h.qty*h.currentPrice,0);
      const totalCost =resolvedHoldings.reduce((s,h)=>s+h.qty*h.avgCost,0);
      const totalGL   =totalVal-totalCost;
      const totalGLPct=totalCost?totalGL/totalCost*100:0;
      const ytdGL     =resolvedHoldings.reduce((s,h)=>s+h.qty*(h.currentPrice-(h.ytdStartPrice??h.currentPrice)),0);
      const ytdBase   =resolvedHoldings.reduce((s,h)=>s+h.qty*(h.ytdStartPrice??h.currentPrice),0);
      const ytdPct    =ytdBase?ytdGL/ytdBase*100:0;
      const breaches  =resolvedHoldings.filter(h=>h.ticker!=="Cash"&&h.currentPrice<=(h.customExit??h.avgCost*DEFAULT_EXIT_PCT)).length;

      const addRow=()=>{
        const t=newRow.ticker.trim().toUpperCase();
        if(!t)return;
        const id=t+Date.now();
        const avg=newRow.avgCost?+newRow.avgCost:0;
        const qty=newRow.qty?+newRow.qty:0;
        const cur=newRow.currentPrice?+newRow.currentPrice:0;
        const today=new Date().toISOString().split('T')[0];
        if(t!=="CASH"&&cur===0) setPriceFetchTrigger({id,ticker:t});

                  style:{padding:"3px 9px",border:`1px solid ${portfolioModal.period===p?C.accent:C.border}`,borderRadius:"5px",cursor:"pointer",
                    background:portfolioModal.period===p?C.accentBg:"transparent",color:portfolioModal.period===p?C.accent:C.muted,
                    fontSize:"11px",fontFamily:"inherit",fontWeight:portfolioModal.period===p?"600":"400"}},p))
              )
            ),
            // Chart area
            portfolioModal.loading
              ?e("div",{style:{height:320,display:"flex",alignItems:"center",justifyContent:"center"}},
                 e("div",{style:{width:"14px",height:"14px",border:`2px solid ${C.border}`,borderTop:`2px solid ${C.accent}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}))
              :(()=>{
                  const h=resolvedHoldings.find(x=>x.ticker===portfolioModal.ticker);
                  const modalColor=h?(h.currentPrice>=h.avgCost?C.up:C.dn):C.accent;
                  if(chartType==="candle"&&portfolioModal.ohlc&&portfolioModal.ohlc.length>=2)
                    return e(CandlestickChart,{candles:portfolioModal.ohlc,timestamps:portfolioModal.timestamps,period:portfolioModal.period,chartH:320});
                  return e(LargeChart,{pts:portfolioModal.series||[],color:modalColor,timestamps:portfolioModal.timestamps,period:portfolioModal.period,chartH:320,ohlc:portfolioModal.ohlc});
                })()
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(e(FinTrack));
  })();
  </script>
</body>
</html>
